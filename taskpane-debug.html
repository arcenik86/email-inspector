<!DOCTYPE html>
<!--Email Inspector v1.3.1 — Self-Contained Build-->
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Email Inspector</title>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
<style>
/**
 * taskpane.css
 * Email Inspector v1.0.0
 *
 * Styles for the analysis taskpane. Uses CSS custom properties for
 * easy theming and respects system dark/light preference.
 */

/* ------------------------------------------------------------------ */
/*  Theme Variables                                                    */
/* ------------------------------------------------------------------ */
:root {
  --bg-primary: #f8f9fb;
  --bg-secondary: #ffffff;
  --bg-tertiary: #f0f2f5;
  --text-primary: #1a1d23;
  --text-secondary: #4b5563;
  --text-muted: #9ca3af;
  --border-color: #e5e7eb;
  --border-radius: 8px;

  --color-pass: #16a34a;
  --color-pass-bg: #f0fdf4;
  --color-pass-border: #bbf7d0;
  --color-info: #2563eb;
  --color-info-bg: #eff6ff;
  --color-info-border: #bfdbfe;
  --color-warn: #d97706;
  --color-warn-bg: #fffbeb;
  --color-warn-border: #fde68a;
  --color-fail: #dc2626;
  --color-fail-bg: #fef2f2;
  --color-fail-border: #fecaca;
  --color-critical: #991b1b;
  --color-critical-bg: #fef2f2;
  --color-critical-border: #f87171;

  --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  --font-mono: "Cascadia Code", "Fira Code", "Consolas", "Courier New", monospace;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg-primary: #111318;
    --bg-secondary: #1a1d24;
    --bg-tertiary: #22262e;
    --text-primary: #f0f1f3;
    --text-secondary: #b0b7c3;
    --text-muted: #8891a0;
    --border-color: #3b4354;

    /* Brighten semantic foreground colors for dark backgrounds */
    --color-pass: #4ade80;
    --color-pass-bg: #052e16;
    --color-pass-border: #166534;
    --color-info: #60a5fa;
    --color-info-bg: #0c1a3d;
    --color-info-border: #1e40af;
    --color-warn: #fbbf24;
    --color-warn-bg: #2d1f04;
    --color-warn-border: #92400e;
    --color-fail: #f87171;
    --color-fail-bg: #2d0a0a;
    --color-fail-border: #991b1b;
    --color-critical: #fca5a5;
    --color-critical-bg: #2d0a0a;
    --color-critical-border: #b91c1c;
  }

  /* Dark mode specific overrides */
  .checks-grid .check-card--expanded {
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }

  .score-banner {
    border-color: var(--border-color);
  }

  .unsubscribe-btn {
    opacity: 0.95;
  }
}

/* ------------------------------------------------------------------ */
/*  Base Reset & Layout                                                */
/* ------------------------------------------------------------------ */
*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  height: 100%;
  overflow-x: hidden;
}

body {
  font-family: var(--font-body);
  font-size: 13px;
  line-height: 1.5;
  color: var(--text-primary);
  background: var(--bg-primary);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Scrollbar styling for the taskpane */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* Selection */
::selection { background: var(--color-info); color: #fff; }

#app {
  max-width: 480px;
  margin: 0 auto;
  padding: 16px;
}

/* ------------------------------------------------------------------ */
/*  Header                                                             */
/* ------------------------------------------------------------------ */
.app-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border-color);
  margin-bottom: 16px;
}

.app-header__icon {
  width: 28px;
  height: 28px;
  flex-shrink: 0;
}

.app-header__title {
  font-size: 16px;
  font-weight: 700;
  color: var(--text-primary);
}

.app-header__version {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 400;
  margin-left: 4px;
}

/* ------------------------------------------------------------------ */
/*  States: Loading, Error, Empty                                      */
/* ------------------------------------------------------------------ */
.state-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 200px;
  text-align: center;
  padding: 24px;
}

.state-container__icon {
  font-size: 36px;
  margin-bottom: 12px;
}

.state-container__message {
  font-size: 14px;
  color: var(--text-secondary);
  max-width: 300px;
}

.state-container__action {
  margin-top: 16px;
}

/* Spinner */
.spinner {
  width: 32px;
  height: 32px;
  border: 3px solid var(--border-color);
  border-top-color: var(--color-info);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 12px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ------------------------------------------------------------------ */
/*  Score Banner                                                       */
/* ------------------------------------------------------------------ */
.score-banner {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px;
  border-radius: var(--border-radius);
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  margin-bottom: 16px;
}

.score-ring {
  position: relative;
  width: 64px;
  height: 64px;
  flex-shrink: 0;
}

.score-ring__svg {
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}

.score-ring__bg {
  fill: none;
  stroke: var(--bg-tertiary);
  stroke-width: 6;
}

.score-ring__fill {
  fill: none;
  stroke-width: 6;
  stroke-linecap: round;
  transition: stroke-dashoffset 1s ease-out, stroke 0.4s;
}

.score-ring__label {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 700;
}

.score-banner__text {
  flex: 1;
}

.score-banner__verdict {
  font-size: 16px;
  font-weight: 700;
}

.score-banner__description {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 2px;
}

/* ------------------------------------------------------------------ */
/*  Message Info (Origin + From/Subject)                               */
/* ------------------------------------------------------------------ */
.message-info {
  padding: 10px 14px;
  border-radius: var(--border-radius);
  background: var(--bg-tertiary);
  margin-bottom: 12px;
  font-size: 12px;
}

.message-info__origin {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}

.message-info__from {
  font-weight: 600;
  color: var(--text-primary);
}

.message-info__subject {
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 2px;
}

.origin-line__label {
  color: var(--text-secondary);
  font-weight: 500;
  font-size: 11px;
}

.origin-badge {
  display: inline-block;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 4px;
}

.origin-badge--internal {
  background: var(--color-pass-bg);
  color: var(--color-pass);
  border: 1px solid var(--color-pass-border);
}

.origin-badge--external {
  background: var(--color-info-bg);
  color: var(--color-info);
  border: 1px solid var(--color-info-border);
}

/* ------------------------------------------------------------------ */
/*  Guidance Box ("What should I do?")                                 */
/* ------------------------------------------------------------------ */
.guidance-box {
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-left: 3px solid var(--color-info);
  border-radius: var(--border-radius);
  margin-bottom: 16px;
  overflow: hidden;
}

.guidance-box__header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  cursor: pointer;
  user-select: none;
}

.guidance-box__header:hover {
  background: var(--bg-tertiary);
}

.guidance-box__icon {
  font-size: 16px;
  flex-shrink: 0;
}

.guidance-box__headline {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-primary);
  flex: 1;
}

.guidance-box__toggle {
  font-size: 10px;
  color: var(--text-muted);
  transition: transform 0.2s;
}

.guidance-box__body {
  max-height: 0;
  overflow: hidden;
  padding: 0 12px;
  opacity: 0;
  transition: max-height 0.35s ease, opacity 0.25s ease, padding 0.3s ease;
}

.guidance-box--expanded .guidance-box__body {
  max-height: 800px;
  opacity: 1;
  padding: 0 12px 12px 12px;
}

.guidance-box--expanded .guidance-box__toggle {
  transform: rotate(90deg);
}

.guidance-box__subhead {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 6px;
}

.guidance-box__text {
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.6;
  margin-bottom: 10px;
}

.guidance-box__actions {
  list-style: none;
  padding: 0;
  margin: 0;
}

.guidance-box__actions li {
  position: relative;
  padding: 6px 0 6px 20px;
  font-size: 12px;
  color: var(--text-primary);
  line-height: 1.5;
}

.guidance-box__actions li::before {
  content: "→";
  position: absolute;
  left: 4px;
  color: var(--text-secondary);
}

.guidance-box__actions li + li {
  border-top: 1px solid var(--border-color);
}

/* ------------------------------------------------------------------ */
/*  Check Cards — Two-Column Grid                                      */
/* ------------------------------------------------------------------ */
.checks-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-bottom: 12px;
}

.section-heading {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  margin-bottom: 8px;
  margin-top: 4px;
}

.check-card {
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: var(--border-radius);
  overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s;
}

/* When expanded inside a grid, span full width */
.checks-grid .check-card--expanded {
  grid-column: 1 / -1;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.check-card--pass   { border-left: 3px solid var(--color-pass); }
.check-card--info   { border-left: 3px solid var(--color-info); }
.check-card--warn   { border-left: 3px solid var(--color-warn); }
.check-card--fail   { border-left: 3px solid var(--color-fail); }
.check-card--critical { border-left: 3px solid var(--color-critical); }

.check-card__header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 10px;
  cursor: pointer;
  user-select: none;
}

.check-card__header:hover {
  background: var(--bg-tertiary);
}

.check-card__badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
}

.check-card__badge--pass     { background: var(--color-pass-bg); color: var(--color-pass); }
.check-card__badge--info     { background: var(--color-info-bg); color: var(--color-info); }
.check-card__badge--warn     { background: var(--color-warn-bg); color: var(--color-warn); }
.check-card__badge--fail     { background: var(--color-fail-bg); color: var(--color-fail); }
.check-card__badge--critical { background: var(--color-critical-bg); color: var(--color-critical); }

.check-card__title {
  font-size: 12px;
  font-weight: 600;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.check-card__chevron {
  font-size: 9px;
  color: var(--text-muted);
  transition: transform 0.2s;
  flex-shrink: 0;
}

.check-card--expanded .check-card__chevron {
  transform: rotate(90deg);
}

.check-card__body {
  max-height: 0;
  overflow: hidden;
  padding: 0 10px 0 36px;
  opacity: 0;
  transition: max-height 0.35s ease, opacity 0.25s ease, padding 0.3s ease;
}

.check-card--expanded .check-card__body {
  max-height: 600px;
  opacity: 1;
  padding: 0 10px 10px 36px;
}

.check-card__summary {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 8px;
}

.check-card__detail {
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.7;
  margin-bottom: 10px;
}

/* ------------------------------------------------------------------ */
/*  Education Box                                                      */
/* ------------------------------------------------------------------ */
.education-box {
  background: var(--bg-tertiary);
  border-radius: 6px;
  border-left: 3px solid var(--color-info);
  padding: 10px 12px;
  font-size: 11.5px;
  line-height: 1.6;
  color: var(--text-secondary);
}

.education-box__label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--color-info);
  margin-bottom: 4px;
}

.education-box__name {
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 6px;
}

.education-box p {
  margin-bottom: 6px;
  color: var(--text-secondary);
}

.education-box strong {
  color: var(--text-primary);
  font-weight: 600;
}

.education-box__link {
  display: inline-block;
  color: var(--color-info);
  text-decoration: none;
  font-weight: 500;
  margin-top: 4px;
}

.education-box__link:hover {
  text-decoration: underline;
}

/* ------------------------------------------------------------------ */
/*  Collapsible Sections (Routing, etc.)                               */
/* ------------------------------------------------------------------ */
.collapsible-section {
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: var(--border-radius);
  margin-bottom: 12px;
  overflow: hidden;
}

.collapsible-section__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px;
  cursor: pointer;
  user-select: none;
}

.collapsible-section__header:hover {
  background: var(--bg-tertiary);
}

.collapsible-section__chevron {
  font-size: 10px;
  color: var(--text-muted);
  transition: transform 0.2s;
}

.collapsible-section--expanded .collapsible-section__chevron {
  transform: rotate(90deg);
}

.collapsible-section__body {
  max-height: 0;
  overflow: hidden;
  padding: 0 12px;
  opacity: 0;
  transition: max-height 0.35s ease, opacity 0.25s ease, padding 0.3s ease;
}

.collapsible-section--expanded .collapsible-section__body {
  max-height: 2000px;
  opacity: 1;
  padding: 0 12px 12px 12px;
}

/* ------------------------------------------------------------------ */
/*  Received Chain / Routing                                           */
/* ------------------------------------------------------------------ */
.routing-list {
  list-style: none;
  padding-left: 16px;
  border-left: 2px solid var(--border-color);
  margin-top: 8px;
}

.routing-list__item {
  position: relative;
  padding: 6px 0 6px 12px;
  font-size: 11.5px;
  color: var(--text-secondary);
}

.routing-list__item::before {
  content: "";
  position: absolute;
  left: -7px;
  top: 12px;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--bg-secondary);
  border: 2px solid var(--border-color);
}

.routing-list__item--tls::before {
  border-color: var(--color-pass);
  background: var(--color-pass-bg);
}

.routing-list__item--no-tls::before {
  border-color: var(--color-warn);
  background: var(--color-warn-bg);
}

.routing-list__server {
  font-family: var(--font-mono);
  font-size: 11px;
  word-break: break-all;
  color: var(--text-primary);
}

.routing-list__meta {
  font-size: 10.5px;
  color: var(--text-secondary);
  margin-top: 1px;
}

/* ------------------------------------------------------------------ */
/*  Unsubscribe Box                                                    */
/* ------------------------------------------------------------------ */
.unsubscribe-box {
  margin-bottom: 12px;
}

.unsubscribe-btn {
  display: block;
  width: 100%;
  padding: 9px;
  text-align: center;
  background: var(--color-info);
  color: #fff;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  text-decoration: none;
  transition: opacity 0.15s;
}

.unsubscribe-btn:hover {
  opacity: 0.9;
}

.unsubscribe-box__warning {
  font-size: 11px;
  font-weight: 500;
  color: var(--color-warn);
  margin-top: 6px;
  line-height: 1.4;
}

/* ------------------------------------------------------------------ */
/*  URL Scan Details                                                   */
/* ------------------------------------------------------------------ */
.url-scan-details {
  font-size: 12px;
}

.url-scan-group {
  margin-bottom: 10px;
}

.url-scan-group__label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 4px;
}

.url-scan-item {
  padding: 6px 0;
  border-bottom: 1px solid var(--border-color);
}

.url-scan-item:last-child {
  border-bottom: none;
}

.url-scan-item--flagged {
  background: var(--color-warn-bg);
  border: 1px solid var(--color-warn-border);
  border-radius: 6px;
  padding: 8px;
  margin-bottom: 6px;
}

.url-scan-item__domain {
  font-weight: 600;
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 11px;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}

.url-scan-item__row {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}

.url-scan-item__domain-inline {
  font-weight: 600;
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 11px;
}

.url-scan-item__meta {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 2px;
}

.url-scan-item__text {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 1px;
  font-style: italic;
}

.url-scan-item__mismatch {
  font-size: 11px;
  color: var(--color-fail);
  margin-top: 3px;
  font-weight: 500;
}

.url-scan-item__mismatch strong {
  font-weight: 700;
}

.url-scan-item__link {
  display: block;
  font-size: 10.5px;
  color: var(--color-info);
  text-decoration: none;
  word-break: break-all;
  margin-top: 3px;
  font-family: var(--font-mono);
}

.url-scan-item__link:hover {
  text-decoration: underline;
}

.url-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 3px;
  font-family: var(--font-body);
}

.url-badge--warn {
  background: var(--color-warn-bg);
  color: var(--color-warn);
  border: 1px solid var(--color-warn-border);
}

.url-badge--fail {
  background: var(--color-fail-bg);
  color: var(--color-fail);
  border: 1px solid var(--color-fail-border);
}

.url-badge--pass {
  background: var(--color-pass-bg);
  color: var(--color-pass);
  border: 1px solid var(--color-pass-border);
}

/* ------------------------------------------------------------------ */
/*  Raw Headers Toggle                                                 */
/* ------------------------------------------------------------------ */
.raw-headers-toggle {
  display: block;
  width: 100%;
  padding: 10px;
  margin-top: 16px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: var(--border-radius);
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  text-align: center;
}

.raw-headers-toggle:hover {
  background: var(--bg-tertiary);
}

.raw-headers-content {
  display: none;
  margin-top: 8px;
  padding: 12px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: var(--border-radius);
  font-family: var(--font-mono);
  font-size: 10.5px;
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 400px;
  overflow-y: auto;
  color: var(--text-primary);
}

.raw-headers-content--visible {
  display: block;
}

/* ------------------------------------------------------------------ */
/*  Button                                                             */
/* ------------------------------------------------------------------ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 8px 16px;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s, opacity 0.15s;
}

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.btn--primary {
  background: var(--color-info);
  color: #fff;
}

.btn--primary:hover:not(:disabled) {
  opacity: 0.9;
}

.btn--ghost {
  background: transparent;
  color: var(--text-secondary);
  border: 1px solid var(--border-color);
}

.btn--ghost:hover:not(:disabled) {
  background: var(--bg-tertiary);
}

/* ------------------------------------------------------------------ */
/*  Action Buttons (Copy Report, Report Phishing)                      */
/* ------------------------------------------------------------------ */
.action-buttons {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}

.action-btn {
  flex: 1;
  font-size: 12px;
  padding: 8px 10px;
  text-decoration: none;
  text-align: center;
  transition: background 0.15s, color 0.15s;
}

.action-btn--success {
  background: var(--color-pass-bg) !important;

<script>
/**
 * header-parser.js
 * Email Inspector v1.0.0
 *
 * Parses raw internet headers from an Outlook message into structured
 * authentication objects (SPF, DKIM, DMARC, routing, envelope data).
 *
 * Public API:
 *   parseAllHeaders(rawHeaderString) → ParsedHeaders
 */

/* ------------------------------------------------------------------ */
/*  Data Structures (documented here; JS is untyped but callers need  */
/*  to know the shapes)                                                */
/* ------------------------------------------------------------------ */

/**
 * @typedef {Object} AuthResult
 * @property {string}  method   - "spf" | "dkim" | "dmarc"
 * @property {string}  result   - "pass" | "fail" | "softfail" | "neutral" | "none" | "temperror" | "permerror" | "bestguesspass" | "policy"
 * @property {string}  detail   - Raw reason/comment string from the header
 * @property {Object}  props    - Key-value pairs (header.from, header.d, smtp.mailfrom, etc.)
 */

/**
 * @typedef {Object} ReceivedHop
 * @property {string} from      - Sending server identifier
 * @property {string} by        - Receiving server identifier
 * @property {string} timestamp  - Date string from header
 * @property {string} protocol  - e.g. "SMTP", "ESMTPS"
 * @property {string} raw       - Full header value
 */

/**
 * @typedef {Object} ParsedHeaders
 * @property {AuthResult[]}   authResults     - Parsed Authentication-Results entries
 * @property {Object[]}       dkimSignatures  - Parsed DKIM-Signature headers
 * @property {ReceivedHop[]}  receivedChain   - Received headers in order (newest first)
 * @property {Object}         envelope        - Return-Path, From, Reply-To, Message-ID, etc.
 * @property {Object}         raw             - All headers as key → value[] map
 */

/* ------------------------------------------------------------------ */
/*  Internal Helpers                                                   */
/* ------------------------------------------------------------------ */

/**
 * Splits a raw header block into a Map of headerName → [values].
 * Handles continuation lines (lines starting with whitespace).
 */
function tokenizeHeaders(rawHeaders) {
  const headers = {};
  if (!rawHeaders || typeof rawHeaders !== "string") return headers;

  // Unfold continuation lines: CRLF + whitespace → single space
  const unfolded = rawHeaders.replace(/\r?\n[ \t]+/g, " ");

  const lines = unfolded.split(/\r?\n/);
  for (const line of lines) {
    const colonIdx = line.indexOf(":");
    if (colonIdx < 1) continue;

    const name = line.substring(0, colonIdx).trim().toLowerCase();
    const value = line.substring(colonIdx + 1).trim();

    if (!headers[name]) headers[name] = [];
    headers[name].push(value);
  }
  return headers;
}

/**
 * Parses an Authentication-Results header value into AuthResult objects.
 *
 * Format (RFC 8601):
 *   serverId; method=result (comment) key=value key=value; method=result ...
 *
 * This parser handles common real-world variations including missing
 * semicolons, extra whitespace, and parenthetical comments.
 */
function parseAuthenticationResults(headerValue) {
  if (!headerValue) return [];

  const results = [];

  // Strip the authserv-id (everything before the first semicolon)
  const semiIdx = headerValue.indexOf(";");
  if (semiIdx < 0) return results;

  const payload = headerValue.substring(semiIdx + 1).trim();
  if (!payload || payload.toLowerCase() === "none") return results;

  // Split on semicolons to get individual method results
  const parts = payload.split(";").map((s) => s.trim()).filter(Boolean);

  for (const part of parts) {
    const result = parseSingleAuthResult(part);
    if (result) results.push(result);
  }

  return results;
}

/**
 * Parses a single "method=result reason key=val key=val" fragment.
 */
function parseSingleAuthResult(fragment) {
  if (!fragment) return null;

  // Remove parenthetical comments but save them for detail
  let detail = "";
  const commentMatch = fragment.match(/\(([^)]*)\)/);
  if (commentMatch) {
    detail = commentMatch[1].trim();
  }
  const cleaned = fragment.replace(/\([^)]*\)/g, " ").replace(/\s+/g, " ").trim();

  // Match "method=result" at the start
  const methodMatch = cleaned.match(/^(\w+)\s*=\s*(\w+)/);
  if (!methodMatch) return null;

  const method = methodMatch[1].toLowerCase();
  const result = methodMatch[2].toLowerCase();

  // Only interested in authentication methods
  const validMethods = ["spf", "dkim", "dmarc", "arc", "dkim-adsp", "domainkeys", "iprev", "auth", "sender-id"];
  if (!validMethods.includes(method)) return null;

  // Parse remaining key=value pairs
  const props = {};
  const kvRegex = /(\w+(?:\.\w+)*)\s*=\s*([^\s;]+)/g;
  const remaining = cleaned.substring(methodMatch[0].length);
  let kvMatch;
  while ((kvMatch = kvRegex.exec(remaining)) !== null) {
    props[kvMatch[1].toLowerCase()] = kvMatch[2];
  }

  return { method, result, detail, props };
}

/**
 * Parses DKIM-Signature header into structured fields.
 *
 * Key fields: v (version), a (algorithm), d (signing domain),
 * s (selector), h (signed headers), bh (body hash), b (signature).
 */
function parseDkimSignature(headerValue) {
  if (!headerValue) return null;

  const fields = {};
  // DKIM tags are separated by semicolons: tag=value
  const parts = headerValue.split(";");
  for (const part of parts) {
    const eqIdx = part.indexOf("=");
    if (eqIdx < 1) continue;
    const tag = part.substring(0, eqIdx).trim().toLowerCase();
    const val = part.substring(eqIdx + 1).trim();
    fields[tag] = val;
  }

  return {
    version: fields.v || "1",
    algorithm: fields.a || "unknown",
    signingDomain: fields.d || "unknown",
    selector: fields.s || "unknown",
    signedHeaders: fields.h ? fields.h.split(":").map((h) => h.trim().toLowerCase()) : [],
    bodyHash: fields.bh || "",
    signature: fields.b || "",
    canonicalization: fields.c || "simple/simple",
    timestamp: fields.t || "",
    expiry: fields.x || "",
    identity: fields.i || "",
    bodyLength: fields.l || "",
    raw: headerValue,
  };
}

/**
 * Parses a Received header into a structured hop.
 */
function parseReceivedHeader(headerValue) {
  if (!headerValue) return null;

  const hop = {
    from: "",
    by: "",
    timestamp: "",
    protocol: "",
    tls: false,
    raw: headerValue,
  };

  // Extract "from <server>" portion
  const fromMatch = headerValue.match(/from\s+(\S+)/i);
  if (fromMatch) hop.from = fromMatch[1];

  // Extract "by <server>" portion
  const byMatch = headerValue.match(/by\s+(\S+)/i);
  if (byMatch) hop.by = byMatch[1];

  // Extract "with <protocol>" portion
  const withMatch = headerValue.match(/with\s+(\S+)/i);
  if (withMatch) {
    hop.protocol = withMatch[1].toUpperCase();
  }

  // TLS detection: check both the protocol keyword AND the full header
  // for version=TLS (Microsoft SMTP Server style) or STARTTLS indicators
  hop.tls = /TLS|ESMTPS|HTTPS/i.test(hop.protocol) ||
    /version=TLS/i.test(headerValue) ||
    /STARTTLS/i.test(headerValue) ||
    /cipher=TLS_/i.test(headerValue);

  // Extract timestamp (everything after the last semicolon)
  const semiIdx = headerValue.lastIndexOf(";");
  if (semiIdx > -1) {
    hop.timestamp = headerValue.substring(semiIdx + 1).trim();
    // Parse to Date object for delay calculations
    try {
      var parsed = new Date(hop.timestamp);
      if (!isNaN(parsed.getTime())) hop.parsedTime = parsed;
    } catch (e) {}
  }

  return hop;
}

/**
 * Extracts a clean email address from a header value that may
 * contain a display name, e.g. '"John Doe" <john@example.com>'
 */
function extractEmailAddress(headerValue) {
  if (!headerValue) return "";
  const angleMatch = headerValue.match(/<([^>]+)>/);
  if (angleMatch) return angleMatch[1].trim().toLowerCase();
  // Might just be a bare address
  const atMatch = headerValue.match(/[\w.+-]+@[\w.-]+/);
  if (atMatch) return atMatch[0].toLowerCase();
  return headerValue.trim().toLowerCase();
}

/**
 * Extracts the domain portion from an email address.
 */
function extractDomain(email) {
  if (!email) return "";
  const clean = extractEmailAddress(email);
  const atIdx = clean.lastIndexOf("@");
  return atIdx > -1 ? clean.substring(atIdx + 1).toLowerCase() : clean.toLowerCase();
}

/* ------------------------------------------------------------------ */
/*  Public API                                                         */
/* ------------------------------------------------------------------ */

/**
 * Main entry point: takes raw header text and returns a fully
 * parsed structure.
 *
 * @param {string} rawHeaders - Complete internet headers as a string
 * @returns {ParsedHeaders}
 */
function parseAllHeaders(rawHeaders) {
  const raw = tokenizeHeaders(rawHeaders);

  // --- Authentication-Results ---
  const authResults = [];
  const arHeaders = raw["authentication-results"] || [];
  for (const arHeader of arHeaders) {
    const parsed = parseAuthenticationResults(arHeader);
    authResults.push(...parsed);
  }

  // --- ARC-Authentication-Results ---
  // These record what each ARC hop saw. Keyed by instance number (i=N).
  // The original hop (i=1) typically has the most trustworthy results.
  const arcAuthResults = parseArcAuthenticationResults(raw);

  // --- Authentication-Results-Original (used by Mimecast and similar) ---
  const origAuthResults = [];
  const origHeaders = raw["authentication-results-original"] || [];
  for (const origHeader of origHeaders) {
    const parsed = parseAuthenticationResults(origHeader);
    origAuthResults.push(...parsed);
  }

  // --- ARC-Seal (check if ARC chain validated) ---
  const arcSeals = parseArcSeals(raw);

  // --- DKIM-Signature ---
  const dkimSignatures = [];
  const dkimHeaders = raw["dkim-signature"] || [];
  for (const dkimHeader of dkimHeaders) {
    const parsed = parseDkimSignature(dkimHeader);
    if (parsed) dkimSignatures.push(parsed);
  }

  // --- Received chain ---
  const receivedChain = [];
  const receivedHeaders = raw["received"] || [];
  for (const recvHeader of receivedHeaders) {
    const parsed = parseReceivedHeader(recvHeader);
    if (parsed) receivedChain.push(parsed);
  }

  // --- Envelope data ---
  const getFirst = (key) => (raw[key] && raw[key][0]) || "";

  const envelope = {
    returnPath: extractEmailAddress(getFirst("return-path")),
    from: getFirst("from"),
    fromAddress: extractEmailAddress(getFirst("from")),
    fromDomain: extractDomain(getFirst("from")),
    replyTo: getFirst("reply-to"),
    replyToAddress: extractEmailAddress(getFirst("reply-to")),
    replyToDomain: extractDomain(getFirst("reply-to")),
    to: getFirst("to"),
    subject: getFirst("subject"),
    date: getFirst("date"),
    messageId: getFirst("message-id"),
    returnPathDomain: extractDomain(getFirst("return-path")),
    mimeVersion: getFirst("mime-version"),
    contentType: getFirst("content-type"),
    xMailer: getFirst("x-mailer"),
    xOriginalSender: getFirst("x-original-sender"),
    listUnsubscribe: getFirst("list-unsubscribe"),
    listUnsubscribePost: getFirst("list-unsubscribe-post"),
    listId: getFirst("list-id"),
    precedence: getFirst("precedence"),
    xAutoResponseSuppress: getFirst("x-auto-response-suppress"),
  };

  // --- Bulk / Spam signals from Microsoft headers ---
  var bulkSignals = parseBulkSignals(raw);

  // --- Internal email detection ---
  var internalSignals = detectInternalEmail(raw);

  return {
    authResults,
    arcAuthResults,
    origAuthResults,
    arcSeals,
    dkimSignatures,
    receivedChain,
    envelope,
    bulkSignals,
    internalSignals,
    raw,
  };
}

/**
 * Detects whether an email is internal to the organization (never
 * left Exchange Online). Internal emails don't go through SPF/DKIM/DMARC
 * because they never traverse the public internet.
 */
function detectInternalEmail(raw) {
  var getFirst = function (key) { return (raw[key] && raw[key][0]) || ""; };

  var authAs = getFirst("x-ms-exchange-organization-authas").toLowerCase().trim();
  var directionality = getFirst("x-ms-exchange-organization-messagedirectionality").toLowerCase().trim();
  var authMech = getFirst("x-ms-exchange-organization-authmechanism").trim();

  // DIR:INT in Forefront-Antispam-Report
  var forefront = getFirst("x-forefront-antispam-report") || getFirst("x-forefront-antispam-report-untrusted") || "";
  var dirMatch = forefront.match(/DIR:(\w+)/i);
  var direction = dirMatch ? dirMatch[1].toUpperCase() : "";

  // Internal when Exchange explicitly says so
  var isInternal = (authAs === "internal") ||
    (directionality === "originating" && authAs === "internal") ||
    (direction === "INT");

  var reasons = [];
  if (authAs === "internal") reasons.push("Exchange AuthAs: Internal");
  if (directionality === "originating") reasons.push("Directionality: Originating");
  if (direction === "INT") reasons.push("Forefront DIR: INT");
  if (authMech === "04") reasons.push("Auth mechanism: Organization (04)");

  return {
    isInternal: isInternal,
    authAs: authAs,
    directionality: directionality,
    direction: direction,
    reasons: reasons,
  };
}

/**
 * Extracts bulk/spam scoring signals from Microsoft Exchange and
 * common spam filter headers.
 *
 * BCL (Bulk Complaint Level): 0-9, how likely the message is bulk/marketing
 *   0 = not bulk, 1-3 = low bulk, 4-7 = bulk, 8-9 = high-confidence bulk
 * SCL (Spam Confidence Level): -1 to 9
 *   -1 = trusted, 0-1 = not spam, 5-6 = spam, 7-9 = high-confidence spam
 */
function parseBulkSignals(raw) {
  var getFirst = function (key) { return (raw[key] && raw[key][0]) || ""; };

  var signals = {
    bcl: -1,
    scl: null,
    spamScore: "",
    category: "",
    listUnsubscribeUrls: [],
    listUnsubscribeMailto: "",
    hasOneClickUnsubscribe: false,
    isMailingList: false,
    isBulk: false,
  };

  // BCL from X-Microsoft-Antispam header
  var msAntispam = getFirst("x-microsoft-antispam") || getFirst("x-microsoft-antispam-untrusted") || "";
  var bclMatch = msAntispam.match(/BCL:(\d+)/i);
  if (bclMatch) signals.bcl = parseInt(bclMatch[1], 10);

  // SCL from dedicated header
  var sclHeader = getFirst("x-ms-exchange-organization-scl");
  if (sclHeader !== "") signals.scl = parseInt(sclHeader, 10);

  // CAT from Forefront-Antispam-Report
  var forefront = getFirst("x-forefront-antispam-report") || getFirst("x-forefront-antispam-report-untrusted") || "";
  var catMatch = forefront.match(/CAT:(\w+)/i);
  if (catMatch) signals.category = catMatch[1].toUpperCase();

  // Third-party spam scores
  var mimecastScore = getFirst("x-mimecast-spam-score");
  if (mimecastScore) signals.spamScore = "Mimecast: " + mimecastScore;
  var spamScore = getFirst("x-spam-score");
  if (spamScore) signals.spamScore = (signals.spamScore ? signals.spamScore + ", " : "") + "SpamAssassin: " + spamScore;

  // List-Unsubscribe: extract URLs from angle brackets
  var listUnsub = getFirst("list-unsubscribe");
  if (listUnsub) {
    var urlMatches = listUnsub.match(/<([^>]+)>/g);
    if (urlMatches) {
      for (var i = 0; i < urlMatches.length; i++) {
        var url = urlMatches[i].replace(/^<|>$/g, "").trim();
        if (/^https?:\/\//i.test(url)) {
          signals.listUnsubscribeUrls.push(url);
        } else if (/^mailto:/i.test(url)) {
          signals.listUnsubscribeMailto = url;
        }
      }
    }
  }

  // One-Click Unsubscribe (RFC 8058)
  var listUnsubPost = getFirst("list-unsubscribe-post");
  if (listUnsubPost && /list-unsubscribe=one-click/i.test(listUnsubPost)) {
    signals.hasOneClickUnsubscribe = true;
  }

  // Mailing list detection
  var listId = getFirst("list-id");
  var precedence = getFirst("precedence");
  signals.isMailingList = !!(listId || (precedence && /^(list|bulk)$/i.test(precedence.trim())));

  // Bulk determination
  signals.isBulk = !!(signals.bcl >= 4 ||
    signals.isMailingList ||
    signals.listUnsubscribeUrls.length > 0 ||
    signals.listUnsubscribeMailto ||
    (precedence && /^bulk$/i.test(precedence.trim())));

  return signals;
}

/**
 * Parses ARC-Authentication-Results headers into a map of instance → AuthResult[].
 * Each ARC-Authentication-Results header starts with "i=N; ..." where N is the hop index.
 */
function parseArcAuthenticationResults(raw) {
  var arcHeaders = raw["arc-authentication-results"] || [];
  var result = {};

  for (var h = 0; h < arcHeaders.length; h++) {
    var header = arcHeaders[h];
    // Extract instance number: "i=1; mx.microsoft.com; spf=pass..."
    var iMatch = header.match(/i\s*=\s*(\d+)\s*;/);
    if (!iMatch) continue;
    var instance = parseInt(iMatch[1], 10);
    // Parse the rest as a normal Authentication-Results header
    // Skip past the "i=N;" to get to the authserv-id and results
    var afterI = header.substring(iMatch.index + iMatch[0].length);
    var parsed = parseAuthenticationResults("dummy" + afterI);
    result[instance] = parsed;
  }

  return result;
}

/**
 * Parses ARC-Seal headers to determine if the ARC chain is valid.
 * Returns an array of seal objects sorted by instance number.
 */
function parseArcSeals(raw) {
  var sealHeaders = raw["arc-seal"] || [];
  var seals = [];

  for (var h = 0; h < sealHeaders.length; h++) {
    var header = sealHeaders[h];
    var fields = {};
    var parts = header.split(";");
    for (var p = 0; p < parts.length; p++) {
      var eqIdx = parts[p].indexOf("=");
      if (eqIdx < 1) continue;
      var tag = parts[p].substring(0, eqIdx).trim().toLowerCase();
      var val = parts[p].substring(eqIdx + 1).trim();
      fields[tag] = val;
    }
    seals.push({
      instance: parseInt(fields.i || "0", 10),
      chainValidation: (fields.cv || "").toLowerCase(), // "none", "pass", "fail"
      domain: fields.d || "",
      selector: fields.s || "",
      algorithm: fields.a || "",
    });
  }

  // Sort by instance ascending
  seals.sort(function (a, b) { return a.instance - b.instance; });
  return seals;
}

/* ------------------------------------------------------------------ */
/*  Exports                                                            */
/* ------------------------------------------------------------------ */
// Works as both a module and a global (for the taskpane <script> tag)
if (typeof module !== "undefined" && module.exports) {
  module.exports = {
    parseAllHeaders,
    parseAuthenticationResults,
    parseArcAuthenticationResults,
    parseArcSeals,
    parseBulkSignals,
    parseDkimSignature,
    parseReceivedHeader,
    extractEmailAddress,
    extractDomain,
    tokenizeHeaders,
  };
}

</script>
<script>
/**
 * phishing-detector.js
 * Email Inspector v1.3.1
 *
 * Detects phishing signals from email headers without accessing body content.
 * All checks are header-only (no elevated permissions needed).
 *
 * Public API:
 *   detectPhishingSignals(envelope, bulkSignals) → PhishingFinding[]
 */

/* ------------------------------------------------------------------ */
/*  Commonly Targeted Domains                                          */
/* ------------------------------------------------------------------ */

/**
 * Domains frequently impersonated in phishing attacks.
 * Used for lookalike/homoglyph detection.
 */
var TARGET_DOMAINS = [
  "microsoft.com", "office365.com", "outlook.com", "live.com",
  "google.com", "gmail.com", "googleapis.com",
  "apple.com", "icloud.com",
  "amazon.com", "aws.amazon.com",
  "paypal.com", "paypal.me",
  "facebook.com", "meta.com", "instagram.com",
  "linkedin.com",
  "twitter.com", "x.com",
  "netflix.com", "spotify.com",
  "dropbox.com", "box.com",
  "salesforce.com",
  "adobe.com",
  "zoom.us", "zoom.com",
  "slack.com",
  "github.com",
  "chase.com", "bankofamerica.com", "wellsfargo.com", "citibank.com",
  "usps.com", "ups.com", "fedex.com", "dhl.com",
  "irs.gov", "ssa.gov",
  "docusign.com", "docusign.net",
  "shopify.com", "stripe.com", "square.com",
];

/**
 * Free/consumer email providers. Business impersonation from these is suspicious.
 */
var FREE_EMAIL_PROVIDERS = [
  "gmail.com", "yahoo.com", "hotmail.com", "outlook.com", "live.com",
  "aol.com", "icloud.com", "mail.com", "protonmail.com", "proton.me",
  "zoho.com", "yandex.com", "gmx.com", "tutanota.com",
];

/**
 * Common homoglyph substitutions (character → what it mimics).
 */
var HOMOGLYPHS = {
  "0": "o", "1": "l", "l": "i", "rn": "m", "vv": "w",
  "cl": "d", "nn": "m", "ii": "u",
};

/**
 * Urgency keywords and phrases commonly used in phishing subjects.
 */
var URGENCY_PATTERNS = [
  /\burgent\b/i, /\bimmediate(?:ly)?\b/i, /\basap\b/i,
  /\baction\s+required\b/i, /\brequired\s+action\b/i,
  /\baccount\s+(?:suspended|locked|disabled|compromised|unusual)\b/i,
  /\bverify\s+(?:your|account|identity|now)\b/i,
  /\bconfirm\s+(?:your|account|identity|now)\b/i,
  /\bunauthorized\s+(?:access|activity|login|transaction)\b/i,
  /\bsuspicious\s+(?:activity|login|sign.?in)\b/i,
  /\bpassword\s+(?:expired?|reset|change)\b/i,
  /\bexpir(?:ed?|ing|ation)\b/i,
  /\bfinal\s+(?:notice|warning|reminder)\b/i,
  /\blast\s+chance\b/i,
  /\bwithin\s+\d+\s+hours?\b/i,
  /\bfailure\s+to\s+(?:respond|verify|confirm|act)\b/i,
  /\byou(?:r|'ve)?\s+(?:won|been\s+selected)\b/i,
  /\bclaim\s+(?:your|now|prize)\b/i,
  /\binheritance\b/i,
  /\blottery\b/i,
  /\bwinning\b/i,
];

/* ------------------------------------------------------------------ */
/*  Detection Functions                                                */
/* ------------------------------------------------------------------ */

/**
 * Calculate Levenshtein distance between two strings.
 */
function levenshtein(a, b) {
  if (a.length === 0) return b.length;
  if (b.length === 0) return a.length;
  var matrix = [];
  for (var i = 0; i <= b.length; i++) matrix[i] = [i];
  for (var j = 0; j <= a.length; j++) matrix[0][j] = j;
  for (var i = 1; i <= b.length; i++) {
    for (var j = 1; j <= a.length; j++) {
      if (b.charAt(i - 1) === a.charAt(j - 1)) {
        matrix[i][j] = matrix[i - 1][j - 1];
      } else {
        matrix[i][j] = Math.min(
          matrix[i - 1][j - 1] + 1, // substitution
          matrix[i][j - 1] + 1,     // insertion
          matrix[i - 1][j] + 1      // deletion
        );
      }
    }
  }
  return matrix[b.length][a.length];
}

/**
 * Apply homoglyph normalization to a domain string.
 * e.g., "paypa1.com" → "paypao.com" (1→l), "rnicrosoft.com" → "microsoft.com" (rn→m)
 */
function normalizeHomoglyphs(domain) {
  var d = domain.toLowerCase();
  // Apply multi-char substitutions first
  d = d.replace(/rn/g, "m").replace(/vv/g, "w").replace(/cl/g, "d").replace(/nn/g, "m").replace(/ii/g, "u");
  // Apply single-char substitutions
  d = d.replace(/0/g, "o").replace(/1/g, "l");
  return d;
}

/**
 * Determine whether a domain is "trusted" under the configured trust list.
 * A domain is trusted when it is an exact match OR a true subdomain of an
 * entry in trustedDomains (i.e. domain ends with ".<trusted>").
 *
 * This is deliberately stricter than substring matching — infix occurrences
 * like "evil.partner.com.attacker.tld" must NOT be treated as trusted, even
 * though ".partner.com" appears inside the string.
 */
function isDomainTrusted(domain, trustedDomains) {
  if (!domain || !trustedDomains || !trustedDomains.length) return false;
  var d = String(domain).toLowerCase();
  for (var i = 0; i < trustedDomains.length; i++) {
    var t = String(trustedDomains[i] || "").toLowerCase().trim();
    if (!t) continue;
    if (d === t) return true;
    if (d.endsWith("." + t)) return true;
  }
  return false;
}

/**
 * Check if a domain is a lookalike of any commonly targeted domain.
 * Returns the matched target domain or null.
 */
function detectLookalikeDomain(fromDomain, trustedDomains) {
  if (!fromDomain) return null;
  var domain = fromDomain.toLowerCase();

  // Skip if it's an exact match (it IS the real domain)
  for (var t = 0; t < TARGET_DOMAINS.length; t++) {
    if (domain === TARGET_DOMAINS[t]) return null;
  }
  // Skip trusted domains (exact match or true subdomain — no infix bypass)
  if (isDomainTrusted(domain, trustedDomains)) return null;

  var normalized = normalizeHomoglyphs(domain);
  var domainBase = domain.split(".")[0]; // just the name part before TLD
  var normalizedBase = normalized.split(".")[0];

  for (var i = 0; i < TARGET_DOMAINS.length; i++) {
    var target = TARGET_DOMAINS[i];
    var targetBase = target.split(".")[0];

    // Check 1: Homoglyph normalization matches
    if (normalizedBase === targetBase && domainBase !== targetBase) {
      return { target: target, type: "homoglyph", detail: '"' + domain + '" normalizes to "' + target + '" after resolving character substitutions (e.g., rn→m, 1→l, 0→o).' };
    }

    // Check 2: Low Levenshtein distance (only for similar-length domains)
    var maxDist = targetBase.length <= 5 ? 1 : 2;
    if (Math.abs(domainBase.length - targetBase.length) <= maxDist) {
      var dist = levenshtein(domainBase, targetBase);
      if (dist > 0 && dist <= maxDist) {
        return { target: target, type: "typosquat", detail: '"' + domain + '" is ' + dist + ' character edit(s) away from "' + target + '". This is a common typosquatting technique.' };
      }
    }

    // Check 3: Target name embedded with extra chars (e.g., "microsoft-verify.com")
    // Only check for targets with 4+ char base names to avoid false positives
    if (targetBase.length >= 4 && domainBase.length > targetBase.length + 2 && domainBase.indexOf(targetBase) > -1 && domainBase !== targetBase) {
      return { target: target, type: "embedded", detail: '"' + domain + '" contains "' + targetBase + '" embedded within it. Attackers often prepend or append words to trusted brand names.' };
    }
  }

  return null;
}

/**
 * Detect display name spoofing patterns.
 * Catches cases like: "Microsoft Support <hacker@evil.com>"
 * or "admin@yourcompany.com <attacker@gmail.com>"
 */
function detectDisplayNameSpoofing(fromHeader, fromAddress, fromDomain) {
  if (!fromHeader || !fromAddress) return [];
  var findings = [];

  // Extract display name (everything before the <email> part)
  var displayName = "";
  var angleMatch = fromHeader.match(/^(.*?)\s*<[^>]+>/);
  if (angleMatch) {
    displayName = angleMatch[1].replace(/^["'\s]+|["'\s]+$/g, "").trim();
  }
  if (!displayName) return findings;

  var displayLower = displayName.toLowerCase();

  // Pattern 1: Display name contains an email address (e.g., "ceo@company.com <attacker@evil.com>")
  var emailInDisplay = displayLower.match(/[\w.+-]+@[\w.-]+\.\w{2,}/);
  if (emailInDisplay) {
    var fakeEmail = emailInDisplay[0];
    if (fakeEmail !== fromAddress.toLowerCase()) {
      findings.push({
        type: "email-in-displayname",
        detail: 'The display name contains "' + fakeEmail + '" but the actual sending address is "' + fromAddress + '". This is a common spoofing technique to trick you into thinking the email is from someone else.',
        severity: "fail",
      });
    }
  }

  // Pattern 2: Display name contains a well-known brand but From domain doesn't match
  var brandChecks = [
    { names: ["microsoft", "office 365", "outlook team", "ms office"], domains: ["microsoft.com", "office365.com", "outlook.com"] },
    { names: ["google", "gmail team"], domains: ["google.com", "gmail.com"] },
    { names: ["apple", "icloud"], domains: ["apple.com", "icloud.com"] },
    { names: ["amazon", "aws"], domains: ["amazon.com", "amazonaws.com"] },
    { names: ["paypal"], domains: ["paypal.com"] },
    { names: ["facebook", "meta"], domains: ["facebook.com", "meta.com", "facebookmail.com"] },
    { names: ["linkedin"], domains: ["linkedin.com"] },
    { names: ["docusign"], domains: ["docusign.com", "docusign.net"] },
  ];

  for (var b = 0; b < brandChecks.length; b++) {
    var brand = brandChecks[b];
    var nameMatch = false;
    for (var n = 0; n < brand.names.length; n++) {
      if (displayLower.indexOf(brand.names[n]) > -1) { nameMatch = true; break; }
    }
    if (!nameMatch) continue;

    var domainMatch = false;
    for (var d = 0; d < brand.domains.length; d++) {
      if (fromDomain === brand.domains[d] || fromDomain.indexOf("." + brand.domains[d]) > -1) { domainMatch = true; break; }
    }
    if (!domainMatch) {
      findings.push({
        type: "brand-impersonation",
        detail: 'The display name mentions "' + brand.names[0] + '" but the email is from "' + fromDomain + '", not an official ' + brand.names[0] + ' domain. This may be impersonation.',
        severity: "warn",
      });
      break; // One brand match is enough
    }
  }

  return findings;
}

/**
 * Check if the From domain is a free email provider while the display
 * name suggests a business or organization.
 */
function detectFreeProviderBusiness(displayName, fromDomain) {
  if (!displayName || !fromDomain) return null;

  var isFreeProvider = false;
  for (var i = 0; i < FREE_EMAIL_PROVIDERS.length; i++) {
    if (fromDomain === FREE_EMAIL_PROVIDERS[i]) { isFreeProvider = true; break; }
  }
  if (!isFreeProvider) return null;

  // Check if display name looks business-like
  var businessPatterns = /\b(inc|corp|llc|ltd|support|helpdesk|admin|billing|accounting|hr\b|human\s+resources|it\s+department|security|compliance|legal|finance)\b/i;
  if (businessPatterns.test(displayName)) {
    return {
      type: "free-provider-business",
      detail: 'The display name "' + displayName + '" suggests a business or department, but the email was sent from a free email provider (' + fromDomain + '). Legitimate businesses typically use their own domain.',
      severity: "warn",
    };
  }
  return null;
}

/**
 * Scan the subject line for urgency keywords commonly used in phishing.
 */
function detectUrgencyKeywords(subject) {
  if (!subject) return [];
  var matched = [];
  for (var i = 0; i < URGENCY_PATTERNS.length; i++) {
    var match = subject.match(URGENCY_PATTERNS[i]);
    if (match) {
      matched.push(match[0]);
    }
  }
  return matched;
}

/* ------------------------------------------------------------------ */
/*  Main Entry Point                                                   */
/* ------------------------------------------------------------------ */

/**
 * Run all phishing detection checks against parsed headers.
 *
 * @param {Object} envelope - From parseAllHeaders().envelope
 * @param {Object} bulkSignals - From parseAllHeaders().bulkSignals
 * @param {Object} config - Admin config (optional) with trustedDomains
 * @returns {Object[]} Array of finding objects with id, severity, summary, detail
 */
function detectPhishingSignals(envelope, bulkSignals, config) {
  var findings = [];
  var trustedDomains = (config && config.trustedDomains) || [];

  // 1. Lookalike domain detection
  var lookalike = detectLookalikeDomain(envelope.fromDomain, trustedDomains);
  if (lookalike) {
    findings.push({
      id: "lookalike-domain",
      severity: "fail",
      summary: "Possible lookalike domain — impersonating " + lookalike.target,
      detail: lookalike.detail + "\n\nLookalike domains are a common phishing tactic where attackers register domains that visually resemble trusted brands to trick recipients.",
    });
  }

  // 2. Display name spoofing
  var displayName = "";
  var angleMatch = (envelope.from || "").match(/^(.*?)\s*<[^>]+>/);
  if (angleMatch) displayName = angleMatch[1].replace(/^["'\s]+|["'\s]+$/g, "").trim();

  var spoofing = detectDisplayNameSpoofing(envelope.from, envelope.fromAddress, envelope.fromDomain);
  for (var s = 0; s < spoofing.length; s++) {
    findings.push({
      id: "display-name-spoof",
      severity: spoofing[s].severity,
      summary: spoofing[s].type === "email-in-displayname"
        ? "Display name contains a fake email address"
        : "Display name impersonates a known brand",
      detail: spoofing[s].detail,
    });
  }

  // 3. Free provider + business name
  var freeProviderBiz = detectFreeProviderBusiness(displayName, envelope.fromDomain);
  if (freeProviderBiz) {
    findings.push({
      id: "free-provider-business",
      severity: freeProviderBiz.severity,
      summary: "Business name from a free email provider",
      detail: freeProviderBiz.detail,
    });
  }

  // 4. Subject urgency analysis
  var urgencyMatches = detectUrgencyKeywords(envelope.subject);
  if (urgencyMatches.length > 0) {
    var matchList = urgencyMatches.map(function (m) { return '"' + m + '"'; }).join(", ");
    findings.push({
      id: "urgency-language",
      severity: urgencyMatches.length >= 2 ? "warn" : "info",
      summary: "Subject contains urgency language (" + urgencyMatches.length + " keyword" + (urgencyMatches.length > 1 ? "s" : "") + ")",
      detail: "Detected: " + matchList + ".\n\nPhishing emails frequently use urgent language to pressure you into acting quickly without thinking. While legitimate emails can also be urgent, combined with other warning signs this increases suspicion.",
    });
  }

  return findings;
}

/* ------------------------------------------------------------------ */
/*  Exports                                                            */
/* ------------------------------------------------------------------ */
if (typeof module !== "undefined" && module.exports) {
  module.exports = {
    detectPhishingSignals,
    detectLookalikeDomain,
    detectDisplayNameSpoofing,
    detectFreeProviderBusiness,
    detectUrgencyKeywords,
    isDomainTrusted,
    normalizeHomoglyphs,
    levenshtein,
    TARGET_DOMAINS,
    FREE_EMAIL_PROVIDERS,
  };
}

<script>
/**
 * url-scanner.js
 * Email Inspector v1.3.1
 *
 * Scans email body HTML for suspicious links. Handles security gateway
 * URL rewriting (Mimecast, SafeLinks, Proofpoint) by extracting original
 * destinations before analysis.
 *
 * No external network calls — all analysis is local pattern matching.
 *
 * Public API:
 *   scanUrls(bodyHtml, envelope, config) → UrlScanResult
 */

/* ------------------------------------------------------------------ */
/*  Security Gateway URL Patterns                                      */
/* ------------------------------------------------------------------ */

var GATEWAY_PATTERNS = [
  {
    name: "Mimecast",
    patterns: [/mimecastprotect\.com/i, /protect-\w+\.mimecast\.com/i],
    extractOriginal: function (url) {
      // Mimecast embeds domain in query: ?domain=original.com
      var domainMatch = url.match(/[?&]domain=([^&]+)/i);
      if (domainMatch) return decodeURIComponent(domainMatch[1]);
      // Some variants use the path
      var pathMatch = url.match(/\/s\/[^/]+\/([^/?]+)/);
      if (pathMatch) return decodeURIComponent(pathMatch[1]);
      return null;
    },
  },
  {
    name: "Microsoft SafeLinks",
    patterns: [/safelinks\.protection\.outlook\.com/i],
    extractOriginal: function (url) {
      var urlMatch = url.match(/[?&]url=([^&]+)/i);
      if (urlMatch) {
        try {
          var decoded = decodeURIComponent(urlMatch[1]);
          var parsed = new URL(decoded);
          return parsed.hostname;
        } catch (e) {
          return decodeURIComponent(urlMatch[1]);
        }
      }
      return null;
    },
  },
  {
    name: "Proofpoint",
    patterns: [/urldefense\.(?:proofpoint\.)?com/i, /urldefense\.com/i],
    extractOriginal: function (url) {
      // v2: /v2/url?u=https-3A__example.com...
      var v2Match = url.match(/[?&]u=([^&]+)/i);
      if (v2Match) {
        var decoded = decodeURIComponent(v2Match[1])
          .replace(/-3A/g, ":").replace(/-2F/g, "/").replace(/-2D/g, "-")
          .replace(/_/g, "/").replace(/-26/g, "&").replace(/-3F/g, "?");
        try { return new URL(decoded).hostname; } catch (e) { return decoded; }
      }
      // v3: /v3/__https://example.com/path__;...
      var v3Match = url.match(/\/v3\/__([^_]+)/);
      if (v3Match) {
        try { return new URL(decodeURIComponent(v3Match[1])).hostname; } catch (e) {}
      }
      return null;
    },
  },
  {
    name: "Barracuda",
    patterns: [/barracuda\.com\/linkprotection/i],
    extractOriginal: function (url) {
      var match = url.match(/[?&]url=([^&]+)/i);
      if (match) {
        try { return new URL(decodeURIComponent(match[1])).hostname; } catch (e) {}
      }
      return null;
    },
  },
];

/**
 * URL shortener domains.
 */
var SHORTENER_DOMAINS = [
  "bit.ly", "tinyurl.com", "t.co", "goo.gl", "ow.ly", "is.gd",
  "buff.ly", "dlvr.it", "j.mp", "rb.gy", "cutt.ly", "shorturl.at",
  "tiny.cc", "lnkd.in", "shor.by", "qr.ae", "adf.ly",
];

/**
 * Suspicious TLDs for link destinations.
 */
var SUSPICIOUS_LINK_TLDS = /\.(xyz|top|club|buzz|wang|gq|ml|cf|tk|ga|work|click|loan|racing|date|stream|download|bid|win|review|vip|icu|monster|rest|hair|cfd|sbs|quest|zip|mov)$/i;

/* ------------------------------------------------------------------ */
/*  URL Extraction and Analysis                                        */
/* ------------------------------------------------------------------ */

/**
 * Extract all links from HTML body.
 * Returns array of { href, text, rawHtml }
 */
function extractLinksFromHtml(html) {
  if (!html) return [];

  var links = [];
  // Match <a> tags with href
  var regex = /<a\s+[^>]*href\s*=\s*["']([^"']+)["'][^>]*>([\s\S]*?)<\/a>/gi;
  var match;

  while ((match = regex.exec(html)) !== null) {
    var href = match[1].trim();
    // Strip HTML tags from link text
    var text = match[2].replace(/<[^>]+>/g, "").replace(/\s+/g, " ").trim();

    // Only process http/https links
    if (/^https?:\/\//i.test(href)) {
      links.push({ href: href, text: text, rawHtml: match[0] });
    }
  }

  return links;
}

/**
 * Check if a URL is wrapped by a known security gateway.
 * Returns { isWrapped, gateway, originalDomain } or { isWrapped: false }
 */
function unwrapGatewayUrl(url) {
  for (var i = 0; i < GATEWAY_PATTERNS.length; i++) {
    var gw = GATEWAY_PATTERNS[i];
    for (var p = 0; p < gw.patterns.length; p++) {
      if (gw.patterns[p].test(url)) {
        var original = gw.extractOriginal(url);
        return {
          isWrapped: true,
          gateway: gw.name,
          originalDomain: original || "unknown",
        };
      }
    }
  }
  return { isWrapped: false, gateway: null, originalDomain: null };
}

/**
 * Extract the domain from a URL string.
 */
function domainFromUrl(url) {
  try {
    return new URL(url).hostname.toLowerCase();
  } catch (e) {
    var match = url.match(/https?:\/\/([^/:?#]+)/i);
    return match ? match[1].toLowerCase() : "";
  }
}

/**
 * Check if link text looks like a URL that doesn't match the actual href domain.
 * e.g., text says "https://paypal.com/login" but href goes to evil.com
 */
function checkMismatchedAnchorText(link) {
  var text = link.text.trim();
  // Does the visible text look like a URL?
  if (!/^https?:\/\//i.test(text) && !/^www\./i.test(text)) return null;

  var textDomain = "";
  if (/^https?:\/\//i.test(text)) {
    textDomain = domainFromUrl(text);
  } else if (/^www\./i.test(text)) {
    textDomain = text.replace(/^www\./i, "").split("/")[0].toLowerCase();
  }
  if (!textDomain) return null;

  var hrefDomain = domainFromUrl(link.href);

  // Unwrap if gateway-wrapped
  var unwrapped = unwrapGatewayUrl(link.href);
  if (unwrapped.isWrapped && unwrapped.originalDomain) {
    hrefDomain = unwrapped.originalDomain.toLowerCase();
  }

  // Compare base domains (strip subdomains for comparison)
  var textBase = textDomain.split(".").slice(-2).join(".");
  var hrefBase = hrefDomain.split(".").slice(-2).join(".");

  if (textBase && hrefBase && textBase !== hrefBase) {
    return {
      displayedUrl: text,
      displayedDomain: textDomain,
      actualDomain: hrefDomain,
    };
  }
  return null;
}

/* ------------------------------------------------------------------ */
/*  Main Scanner                                                       */
/* ------------------------------------------------------------------ */

/**
 * Scan email body HTML for suspicious URLs.
 *
 * @param {string} bodyHtml - The email body as HTML
 * @param {Object} envelope - From parseAllHeaders().envelope
 * @param {Object} config - Admin config (optional)
 * @returns {Object} { findings, stats, links }
 */
function scanUrls(bodyHtml, envelope, config) {
  var trustedDomains = (config && config.trustedDomains) || [];
  var fromDomain = (envelope && envelope.fromDomain) || "";

  var links = extractLinksFromHtml(bodyHtml);
  var findings = [];

  var stats = {
    totalLinks: links.length,
    externalLinks: 0,
    shortenedLinks: 0,
    gatewayWrapped: 0,
    suspiciousTld: 0,
    mismatchedText: 0,
  };

  if (links.length === 0) {
    return { findings: findings, stats: stats, links: [] };
  }

  var analyzedLinks = [];
  var seenDomains = {};

  for (var i = 0; i < links.length; i++) {
    var link = links[i];
    var domain = domainFromUrl(link.href);
    var unwrapped = unwrapGatewayUrl(link.href);
    var effectiveDomain = unwrapped.isWrapped && unwrapped.originalDomain
      ? unwrapped.originalDomain.toLowerCase() : domain;

    if (unwrapped.isWrapped) stats.gatewayWrapped++;

    var linkInfo = {
      href: link.href,
      text: link.text,
      domain: domain,
      effectiveDomain: effectiveDomain,
      gateway: unwrapped.gateway,
      flags: [],
    };

    // Skip internal/same-domain links
    var effectiveBase = effectiveDomain.split(".").slice(-2).join(".");
    var fromBase = fromDomain.split(".").slice(-2).join(".");
    var isTrusted = false;
    for (var t = 0; t < trustedDomains.length; t++) {
      if (effectiveDomain === trustedDomains[t].toLowerCase() ||
          effectiveDomain.indexOf("." + trustedDomains[t].toLowerCase()) > -1) {
        isTrusted = true;
        break;
      }
    }

    if (effectiveBase !== fromBase && !isTrusted) {
      stats.externalLinks++;
    }

    // Check 1: URL shortener
    var isShortened = false;
    for (var s = 0; s < SHORTENER_DOMAINS.length; s++) {
      if (effectiveDomain === SHORTENER_DOMAINS[s] || domain === SHORTENER_DOMAINS[s]) {
        isShortened = true;
        stats.shortenedLinks++;
        linkInfo.flags.push("shortened");
        break;
      }
    }

    // Check 2: Suspicious TLD
    if (SUSPICIOUS_LINK_TLDS.test(effectiveDomain)) {
      stats.suspiciousTld++;
      linkInfo.flags.push("suspicious-tld");
    }

    // Check 3: Mismatched anchor text (the big one for phishing)
    var mismatch = checkMismatchedAnchorText(link);
    if (mismatch) {
      stats.mismatchedText++;
      linkInfo.flags.push("mismatched-text");
      linkInfo.mismatch = mismatch;
    }

    // Track unique domains
    if (!seenDomains[effectiveDomain]) {
      seenDomains[effectiveDomain] = 0;
    }
    seenDomains[effectiveDomain]++;

    analyzedLinks.push(linkInfo);
  }

  // Generate findings from stats

  // Mismatched anchor text — high severity
  if (stats.mismatchedText > 0) {
    var mismatchLinks = analyzedLinks.filter(function (l) { return l.mismatch; });
    var mismatchDetails = mismatchLinks.map(function (l) {
      return 'Displayed: "' + l.mismatch.displayedDomain + '" → Actual: "' + l.mismatch.actualDomain + '"';
    }).join("\n");
    findings.push({
      id: "url-text-mismatch",
      severity: "fail",
      summary: stats.mismatchedText + " link(s) display a different URL than they actually go to",
      detail: "This is a strong phishing indicator. The visible link text shows one domain but clicking it would take you to a different domain entirely.\n\n" + mismatchDetails + "\n\nNever click links where the displayed URL doesn't match the destination.",
    });
  }

  // Shortened URLs
  if (stats.shortenedLinks > 0) {
    findings.push({
      id: "url-shortened",
      severity: "warn",
      summary: stats.shortenedLinks + " shortened URL(s) detected (destination hidden)",
      detail: "URL shorteners (bit.ly, tinyurl, etc.) hide the true destination. While commonly used in marketing emails, they are also used in phishing to disguise malicious links. Hover over shortened links before clicking to see where they lead.",
    });
  }

  // Suspicious TLDs in links
  if (stats.suspiciousTld > 0) {
    var suspTldLinks = analyzedLinks.filter(function (l) { return l.flags.indexOf("suspicious-tld") > -1; });
    var suspDomains = suspTldLinks.map(function (l) { return l.effectiveDomain; }).filter(function (d, i, a) { return a.indexOf(d) === i; });
    findings.push({
      id: "url-suspicious-tld",
      severity: "warn",
      summary: "Links point to suspicious TLD(s): " + suspDomains.join(", "),
      detail: "Some links in this email point to domains using TLDs with high abuse rates. This doesn't mean the links are necessarily malicious, but exercise extra caution before clicking.",
    });
  }

  // Gateway wrapping (positive signal)
  if (stats.gatewayWrapped > 0) {
    var gateways = {};
    analyzedLinks.forEach(function (l) { if (l.gateway) gateways[l.gateway] = true; });
    findings.push({
      id: "url-gateway-wrapped",
      severity: "pass",
      summary: stats.gatewayWrapped + " link(s) protected by " + Object.keys(gateways).join(", "),
      detail: "Links in this email have been wrapped by your organization's email security gateway. This means they will be scanned for malicious content when you click them. This is a positive security indicator showing your email protection is active.",
    });
  }

  // High external link count (info)
  var uniqueExternalDomains = Object.keys(seenDomains).filter(function (d) {
    var base = d.split(".").slice(-2).join(".");
    return base !== fromBase;
  });
  if (uniqueExternalDomains.length > 5) {
    findings.push({
      id: "url-many-external",
      severity: "info",
      summary: "Links to " + uniqueExternalDomains.length + " different external domains",
      detail: "This email contains links to many different external domains. While common in newsletters, it's unusual for personal or business email. Domains: " + uniqueExternalDomains.slice(0, 10).join(", ") + (uniqueExternalDomains.length > 10 ? " (+" + (uniqueExternalDomains.length - 10) + " more)" : ""),
    });
  }

  return {
    findings: findings,
    stats: stats,
    links: analyzedLinks,
  };
}

/* ------------------------------------------------------------------ */

const SEVERITY = {
  PASS: "pass",
  INFO: "info",
  WARN: "warn",
  FAIL: "fail",
  CRITICAL: "critical",
};

const SEVERITY_WEIGHT = {
  [SEVERITY.PASS]: 0,
  [SEVERITY.INFO]: 0,
  [SEVERITY.WARN]: 15,
  [SEVERITY.FAIL]: 30,
  [SEVERITY.CRITICAL]: 50,
};

/* ------------------------------------------------------------------ */
/*  Individual Checks                                                  */
