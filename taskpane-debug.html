/**
 * Evaluate SPF result from Authentication-Results.
 */
function checkSPF(parsedHeaders) {
  const spfResult = parsedHeaders.authResults.find((r) => r.method === "spf");

  if (!spfResult) {
    return {
      id: "spf",
      title: "SPF Check",
      severity: SEVERITY.WARN,
      summary: "No SPF result found in email headers",
      detail:
        "The receiving mail server did not record an SPF check result. This may mean the sending domain has no SPF record published, or the result was stripped.",
      education: EDUCATION.spf,
      rawResult: null,
    };
  }

  const result = spfResult.result;
  const domain = spfResult.props["smtp.mailfrom"] || spfResult.props["smtp.helo"] || parsedHeaders.envelope.returnPathDomain || "unknown";

  const verdicts = {
    pass: {
      severity: SEVERITY.PASS,
      summary: `SPF passed for domain: ${domain}`,
      detail: `The sending server is authorized by ${domain}'s SPF record to send mail on its behalf.`,
    },
    fail: {
      severity: SEVERITY.FAIL,
      summary: `SPF failed for domain: ${domain}`,
      detail: `The sending server is NOT authorized by ${domain}'s SPF record. This is a strong indicator of spoofing or misconfiguration.`,
    },
    softfail: {
      severity: SEVERITY.WARN,
      summary: `SPF soft-failed for domain: ${domain}`,
      detail: `The sending server is probably not authorized by ${domain}. A soft-fail is a weaker signal than a hard fail — the domain owner is unsure about this server.`,
    },
    neutral: {
      severity: SEVERITY.INFO,
      summary: `SPF neutral for domain: ${domain}`,
      detail: `The domain owner's SPF record explicitly makes no assertion about this sending server. This is not necessarily suspicious.`,
    },
    none: {
      severity: SEVERITY.WARN,
      summary: `No SPF record for domain: ${domain}`,
      detail: `The domain ${domain} does not publish an SPF record. Without SPF, there is no way to verify the sending server is authorized.`,
    },
    temperror: {
      severity: SEVERITY.WARN,
      summary: `SPF temporary error for domain: ${domain}`,
      detail: `A temporary DNS error prevented the SPF check from completing. This is usually a transient issue, not necessarily suspicious.`,
    },
    permerror: {
      severity: SEVERITY.WARN,
      summary: `SPF permanent error for domain: ${domain}`,
      detail: `The SPF record for ${domain} has a syntax error or configuration problem. The check could not be performed.`,
    },
  };

  const verdict = verdicts[result] || {
    severity: SEVERITY.INFO,
    summary: `SPF result: ${result} for ${domain}`,
    detail: `Unrecognized SPF result "${result}". The raw detail is: ${spfResult.detail || "none"}.`,
  };

  return {
    id: "spf",
    title: "SPF Check",
    severity: verdict.severity,
    summary: verdict.summary,
    detail: verdict.detail + (spfResult.detail ? ` (Server note: ${spfResult.detail})` : ""),
    education: EDUCATION.spf,
    rawResult: spfResult,
  };
}

/**
 * Evaluate DKIM result(s) from Authentication-Results and DKIM-Signature.
 */
function checkDKIM(parsedHeaders) {
  const dkimResults = parsedHeaders.authResults.filter((r) => r.method === "dkim");

  if (dkimResults.length === 0 && parsedHeaders.dkimSignatures.length === 0) {
    return {
      id: "dkim",
      title: "DKIM Check",
      severity: SEVERITY.WARN,
      summary: "No DKIM signature found",
      detail:
        "This email has no DKIM signature. The sending domain either does not sign outgoing mail or the signature was stripped in transit.",
      education: EDUCATION.dkim,
      rawResult: null,
      signatures: [],
    };
  }

  // Check if any DKIM result passed
  const passing = dkimResults.filter((r) => r.result === "pass");
  const failing = dkimResults.filter((r) => r.result === "fail");

  const sigDomains = parsedHeaders.dkimSignatures.map((s) => s.signingDomain).join(", ") || "unknown";

  if (passing.length > 0) {
    const passedDomains = passing.map((r) => r.props["header.d"] || "unknown").join(", ");
    return {
      id: "dkim",
      title: "DKIM Check",
      severity: SEVERITY.PASS,
      summary: `DKIM passed (signed by: ${passedDomains})`,
      detail: `The DKIM signature was verified successfully. The email content has not been altered since it was signed by ${passedDomains}.`,
      education: EDUCATION.dkim,
      rawResult: passing[0],
      signatures: parsedHeaders.dkimSignatures,
    };
  }

  if (failing.length > 0) {
    return {
      id: "dkim",
      title: "DKIM Check",
      severity: SEVERITY.FAIL,
      summary: `DKIM failed (signing domain: ${sigDomains})`,
      detail:
        "The DKIM signature verification failed. This means the email may have been altered after it was sent, or the DKIM key is misconfigured.",
      education: EDUCATION.dkim,
      rawResult: failing[0],
      signatures: parsedHeaders.dkimSignatures,
    };
  }

  // Has signatures but no auth-results verdict
  return {
    id: "dkim",
    title: "DKIM Check",
    severity: SEVERITY.INFO,
    summary: `DKIM signature present (domain: ${sigDomains}), but no verification result`,
    detail: "A DKIM signature is present but the receiving server did not record a pass or fail verdict.",
    education: EDUCATION.dkim,
    rawResult: null,
    signatures: parsedHeaders.dkimSignatures,
  };
}

/**
 * Evaluate DMARC result from Authentication-Results.
 */
function checkDMARC(parsedHeaders) {
  const dmarcResult = parsedHeaders.authResults.find((r) => r.method === "dmarc");

  if (!dmarcResult) {
    return {
      id: "dmarc",
      title: "DMARC Check",
      severity: SEVERITY.WARN,
      summary: "No DMARC result found",
      detail:
        "The receiving server did not record a DMARC check. The sending domain may not have a DMARC policy published.",
      education: EDUCATION.dmarc,
      rawResult: null,
    };
  }

  const result = dmarcResult.result;
  const domain = dmarcResult.props["header.from"] || parsedHeaders.envelope.fromDomain || "unknown";

  const verdicts = {
    pass: {
      severity: SEVERITY.PASS,
      summary: `DMARC passed for ${domain}`,
      detail: `The email passes DMARC verification. The From address domain (${domain}) is authenticated — this is the strongest positive signal for email legitimacy.`,
    },
    fail: {
      severity: SEVERITY.CRITICAL,
      summary: `DMARC FAILED for ${domain}`,
      detail: `DMARC verification failed. The From address domain (${domain}) could NOT be authenticated. This is a significant red flag — the email may be spoofed.`,
    },
    none: {
      severity: SEVERITY.WARN,
      summary: `No DMARC policy for ${domain}`,
      detail: `The domain ${domain} does not publish a DMARC policy. Without DMARC, there is no definitive way to verify the From address is authentic.`,
    },
    bestguesspass: {
      severity: SEVERITY.INFO,
      summary: `DMARC best-guess pass for ${domain}`,
      detail: `The server inferred a DMARC pass even though ${domain} may not have a formal DMARC record. This is a positive but weaker signal.`,
    },
  };

  const verdict = verdicts[result] || {
    severity: SEVERITY.INFO,
    summary: `DMARC result: ${result} for ${domain}`,
    detail: `The DMARC result is "${result}". Raw detail: ${dmarcResult.detail || "none"}.`,
  };

  return {
    id: "dmarc",
    title: "DMARC Check",
    severity: verdict.severity,
    summary: verdict.summary,
    detail: verdict.detail + (dmarcResult.detail ? ` (${dmarcResult.detail})` : ""),
    education: EDUCATION.dmarc,
    rawResult: dmarcResult,
  };
}

/**
 * Check alignment between the From domain and the SPF/DKIM domains.
 */
function checkAlignment(parsedHeaders) {
  const fromDomain = parsedHeaders.envelope.fromDomain;
  if (!fromDomain) {
    return {
      id: "alignment",
      title: "Domain Alignment",
      severity: SEVERITY.WARN,
      summary: "Could not determine From domain",
      detail: "The From header could not be parsed, so alignment cannot be checked.",
      education: EDUCATION.alignment,
    };
  }

  const findings = [];
  let spfAligned = false;
  let dkimAligned = false;

  // SPF alignment: Return-Path domain vs From domain
  const returnPathDomain = parsedHeaders.envelope.returnPathDomain;
  if (returnPathDomain) {
    spfAligned = doDomainsAlign(fromDomain, returnPathDomain);
    findings.push(
      spfAligned
        ? `SPF aligned: Return-Path domain (${returnPathDomain}) matches From domain (${fromDomain}).`
        : `SPF NOT aligned: Return-Path domain (${returnPathDomain}) differs from From domain (${fromDomain}).`
    );
  } else {
    findings.push("SPF alignment: No Return-Path header found to compare.");
  }

  // DKIM alignment: signing domain(s) vs From domain
  if (parsedHeaders.dkimSignatures.length > 0) {
    for (const sig of parsedHeaders.dkimSignatures) {
      const sigDomain = sig.signingDomain.toLowerCase();
      const aligned = doDomainsAlign(fromDomain, sigDomain);
      if (aligned) dkimAligned = true;
      findings.push(
        aligned
          ? `DKIM aligned: Signing domain (${sigDomain}) matches From domain (${fromDomain}).`
          : `DKIM NOT aligned: Signing domain (${sigDomain}) differs from From domain (${fromDomain}).`
      );
    }
  } else {
    // Also check auth-results for DKIM domain
    const dkimResult = parsedHeaders.authResults.find((r) => r.method === "dkim" && r.props["header.d"]);
    if (dkimResult) {
      const sigDomain = dkimResult.props["header.d"].toLowerCase();
      dkimAligned = doDomainsAlign(fromDomain, sigDomain);
      findings.push(
        dkimAligned
          ? `DKIM aligned: Signing domain (${sigDomain}) matches From domain (${fromDomain}).`
          : `DKIM NOT aligned: Signing domain (${sigDomain}) differs from From domain (${fromDomain}).`
      );
    } else {
      findings.push("DKIM alignment: No DKIM signature domain found to compare.");
    }
  }

  const eitherAligned = spfAligned || dkimAligned;

  let severity, summary;
  if (eitherAligned) {
    severity = SEVERITY.PASS;
    summary = `Domain alignment verified (${spfAligned ? "SPF" : ""}${spfAligned && dkimAligned ? " + " : ""}${dkimAligned ? "DKIM" : ""} aligned with From: ${fromDomain})`;
  } else if (!returnPathDomain && parsedHeaders.dkimSignatures.length === 0) {
    severity = SEVERITY.WARN;
    summary = "Cannot verify alignment — insufficient header data";
  } else {
    severity = SEVERITY.FAIL;
    summary = `Domain alignment FAILED — neither SPF nor DKIM domains match From: ${fromDomain}`;
  }

  return {
    id: "alignment",
    title: "Domain Alignment",
    severity,
    summary,
    detail: findings.join("\n"),
    education: EDUCATION.alignment,
    spfAligned,
    dkimAligned,
  };
}

/**
 * Check for relaxed domain alignment (organizational domain match).
 * e.g., "mail.example.com" aligns with "example.com"
 */
function doDomainsAlign(domain1, domain2) {
  if (!domain1 || !domain2) return false;
  const d1 = domain1.toLowerCase();
  const d2 = domain2.toLowerCase();
  if (d1 === d2) return true;
  // Relaxed alignment: one domain is a subdomain of the other
  return d1.endsWith("." + d2) || d2.endsWith("." + d1);
}

/**
 * Classify the email as personal, marketing/bulk, or spam based on
 * BCL, SCL, List-Unsubscribe, and other bulk signals.
 */
function checkClassification(parsedHeaders) {
  var bulk = parsedHeaders.bulkSignals || {};
  var env = parsedHeaders.envelope;
  var bcl = bulk.bcl !== undefined ? bulk.bcl : -1;
  var scl = bulk.scl;

  var details = [];
  var classification = "personal"; // personal | marketing | bulk | spam

  // BCL analysis
  if (bcl >= 0) {
    details.push("BCL (Bulk Complaint Level): " + bcl + "/9");
    if (bcl === 0) details.push("  → Not identified as bulk mail.");
    else if (bcl <= 3) details.push("  → Low bulk indicators. Sender has few complaints.");
    else if (bcl <= 6) details.push("  → Moderate bulk indicators. Likely a mailing list or marketing sender.");
    else details.push("  → High bulk score. Sender generates significant complaint volume.");
  }

  // SCL analysis
  if (scl !== null && scl !== undefined) {
    details.push("SCL (Spam Confidence Level): " + scl);
    if (scl === -1) details.push("  → Trusted sender (bypassed spam filtering).");
    else if (scl <= 1) details.push("  → Not spam.");
    else if (scl <= 4) details.push("  → Low spam confidence.");
    else if (scl <= 6) details.push("  → Moderate spam confidence.");
    else details.push("  → High spam confidence.");
  }

  // Third-party scores
  if (bulk.spamScore) {
    details.push("Third-party score: " + bulk.spamScore);
  }

  // Unsubscribe signals
  if (bulk.listUnsubscribeUrls.length > 0 || bulk.listUnsubscribeMailto) {
    details.push("Unsubscribe mechanism: Present" + (bulk.hasOneClickUnsubscribe ? " (one-click supported)" : ""));
  }

  // Mailing list signals
  if (bulk.isMailingList) {
    details.push("Mailing list headers detected (List-Id or Precedence: list/bulk).");
  }

  // Category from Forefront
  if (bulk.category && bulk.category !== "NONE") {
    details.push("Exchange category: " + bulk.category);
  }

  // Determine classification
  if (scl !== null && scl >= 5) {
    classification = "spam";
  } else if (bcl >= 7) {
    classification = "bulk";
  } else if (bcl >= 4 || bulk.isMailingList || bulk.isBulk) {
    classification = "marketing";
  } else if (bulk.listUnsubscribeUrls.length > 0 || bulk.listUnsubscribeMailto) {
    classification = "marketing";
  }

  var classLabels = {
    personal: { label: "Personal / Transactional", severity: SEVERITY.PASS, icon: "✉" },
    marketing: { label: "Marketing / Newsletter", severity: SEVERITY.INFO, icon: "📢" },
    bulk: { label: "Bulk Mail", severity: SEVERITY.WARN, icon: "📦" },
    spam: { label: "Likely Spam", severity: SEVERITY.FAIL, icon: "🚫" },
  };

  var cl = classLabels[classification];

  return {
    id: "classification",
    title: "Email Classification",
    severity: cl.severity,
    summary: cl.icon + " " + cl.label,
    detail: details.join("\n") || "No bulk/spam scoring headers found. This is typical of direct personal email.",
    education: EDUCATION.classification,
    classification: classification,
    bulkSignals: bulk,
  };
}

/**
 * Check for suspicious indicators (Reply-To mismatch, display name tricks, etc.)
 */
function checkSuspiciousIndicators(parsedHeaders, config) {
  const findings = [];
  const env = parsedHeaders.envelope;

  // 0. Phishing detection (if phishing-detector.js is loaded)
  if (typeof detectPhishingSignals === "function") {
    var phishingFindings = detectPhishingSignals(env, parsedHeaders.bulkSignals, config);
    for (var pf = 0; pf < phishingFindings.length; pf++) {
      var pFind = phishingFindings[pf];
      findings.push({
        id: pFind.id,
        severity: pFind.severity || SEVERITY.WARN,
        summary: pFind.summary,
        detail: pFind.detail,
      });
    }
  }

  // 1. Reply-To mismatch
  if (env.replyToAddress && env.fromAddress) {
    const replyDomain = env.replyToDomain;
    const fromDomain = env.fromDomain;
    if (replyDomain && fromDomain && replyDomain !== fromDomain) {
      findings.push({
        id: "reply-to-mismatch",
        severity: SEVERITY.WARN,
        summary: `Reply-To domain (${replyDomain}) differs from From domain (${fromDomain})`,
        detail: `Replies to this email will go to ${env.replyToAddress}, not the apparent sender ${env.fromAddress}. While sometimes legitimate (mailing lists, shared inboxes), this is a common phishing technique.`,
        education: EDUCATION.replyTo,
      });
    }
  }

  // 2. Return-Path vs From mismatch (separate from alignment, more user-facing)
  if (env.returnPath && env.fromAddress && env.returnPathDomain !== env.fromDomain) {
    findings.push({
      id: "return-path-mismatch",
      severity: SEVERITY.INFO,
      summary: `Envelope sender (${env.returnPath}) differs from display sender (${env.fromAddress})`,
      detail: `The "envelope" sender (Return-Path) is different from the visible "From" address. This is common for mailing lists and legitimate services, but can also indicate spoofing.`,
      education: EDUCATION.alignment,
    });
  }

  // 3. Missing or suspicious Message-ID
  if (!env.messageId) {
    findings.push({
      id: "no-message-id",
      severity: SEVERITY.INFO,
      summary: "No Message-ID header found",
      detail: "A missing Message-ID is unusual and may indicate the email was crafted by a non-standard tool.",
    });
  }

  // 4. Routing analysis — flag unencrypted hops, but exclude internal
  //    Exchange hops (MAPI protocol, same-server from/by) and skip
  //    entirely for internal org emails (never left Microsoft infra).
  var isInternal = parsedHeaders.internalSignals && parsedHeaders.internalSignals.isInternal;
  const hops = parsedHeaders.receivedChain;
  if (hops.length > 0 && !isInternal) {
    const nonTlsHops = hops.filter(function (h) {
      if (!h.protocol || h.tls) return false;
      // Exclude internal Exchange MAPI submissions
      if (/^MAPI/i.test(h.protocol)) return false;
      // Exclude same-server loopback (from === by)
      if (h.from && h.by && h.from.toLowerCase() === h.by.toLowerCase()) return false;
      // Exclude Microsoft internal transport (prod.outlook.com ↔ prod.outlook.com)
      if (h.from && h.by && /prod\.outlook\.com$/i.test(h.from) && /prod\.outlook\.com$/i.test(h.by)) return false;
      return true;
    });
    if (nonTlsHops.length > 0) {
      findings.push({
        id: "unencrypted-hops",
        severity: SEVERITY.WARN,
        summary: `${nonTlsHops.length} of ${hops.length} mail hops used unencrypted transport`,
        detail: `Some servers in the delivery chain did not use TLS encryption. The email content may have been exposed in transit. (Internal Exchange/MAPI hops are excluded from this count.)`,
        education: EDUCATION.routing,
      });
    }
  }

  // 5. Excessive hops (potential open relay)
  if (hops.length > 8) {
    findings.push({
      id: "excessive-hops",
      severity: SEVERITY.INFO,
      summary: `Email passed through ${hops.length} servers (unusually high)`,
      detail: `The email was relayed through more servers than typical. This may indicate open relays or unusual routing, but can also happen with legitimate forwarding services.`,
      education: EDUCATION.routing,
    });
  }

  // 6. Delivery delay analysis — compare timestamps between hops
  if (!isInternal && hops.length >= 2) {
    var delays = [];
    // Hops are newest-first, so iterate in reverse for chronological order
    for (var d = hops.length - 1; d > 0; d--) {
      var older = hops[d];
      var newer = hops[d - 1];
      if (older.parsedTime && newer.parsedTime) {
        var diffMs = newer.parsedTime.getTime() - older.parsedTime.getTime();
        var diffMin = Math.round(diffMs / 60000);
        if (diffMin > 0) {
          delays.push({
            from: older.by || older.from || "unknown",
            to: newer.by || newer.from || "unknown",
            minutes: diffMin,
          });
        }
      }
    }

    // Total delivery time
    var firstHop = hops[hops.length - 1];
    var lastHop = hops[0];
    var totalMin = 0;
    if (firstHop.parsedTime && lastHop.parsedTime) {
      totalMin = Math.round((lastHop.parsedTime.getTime() - firstHop.parsedTime.getTime()) / 60000);
    }

    // Flag significant delays
    var maxDelay = delays.reduce(function (max, d) { return d.minutes > max.minutes ? d : max; }, { minutes: 0 });
    var hasUrgency = env.subject && /urgent|immediate|verify|action.required|suspended|expired/i.test(env.subject);

    if (maxDelay.minutes > 30) {
      var delaySeverity = SEVERITY.INFO;
      var delayNote = "";
      // Suspicious: email claims urgency but was held for a long time
      if (hasUrgency && maxDelay.minutes > 60) {
        delaySeverity = SEVERITY.WARN;
        delayNote = "\n\nNotably, this email uses urgent language in the subject but was delayed significantly in transit — legitimate urgent emails are typically delivered quickly.";
      }

      var delayDetail = "Total delivery time: " + (totalMin >= 60 ? Math.floor(totalMin / 60) + "h " + (totalMin % 60) + "m" : totalMin + " minutes") + ".";
      delayDetail += "\nLargest single-hop delay: " + maxDelay.minutes + " minutes";
      if (maxDelay.from) delayDetail += " (at " + maxDelay.from + ")";
      delayDetail += ".";
      if (delays.length > 0) {
        delayDetail += "\n\nHop delays: " + delays.map(function (dd) { return dd.minutes + "m"; }).join(" → ");
      }
      delayDetail += delayNote;

      findings.push({
        id: "delivery-delay",
        severity: delaySeverity,
        summary: "Delivery delayed " + (totalMin >= 60 ? Math.floor(totalMin / 60) + "h " + (totalMin % 60) + "m" : totalMin + "m") + " (longest hop: " + maxDelay.minutes + "m)",
        detail: delayDetail,
        education: EDUCATION.routing,
      });
    }
  }

  // 7. Domain age / reputation hints (header-derived, no external lookups)
  if (!isInternal && env.fromDomain) {
    var fromDomain = env.fromDomain;
    var domainFindings = [];

    // Check for suspicious TLDs commonly used in phishing
    var suspiciousTLDs = /\.(xyz|top|club|buzz|wang|gq|ml|cf|tk|ga|work|click|loan|racing|date|stream|download|bid|win|review|vip|icu|monster|rest|hair|cfd|sbs|quest)$/i;
    if (suspiciousTLDs.test(fromDomain)) {
      var tld = fromDomain.match(suspiciousTLDs)[0];
      domainFindings.push("The sender's domain uses the \"" + tld + "\" TLD, which has a disproportionately high rate of abuse and is commonly used in spam/phishing campaigns.");
    }

    // Check for excessive subdomain depth (e.g., login.secure.microsoft.verify.evil.com)
    var subdomainParts = fromDomain.split(".");
    if (subdomainParts.length > 4) {
      domainFindings.push("The sender's domain has " + subdomainParts.length + " levels of subdomains. Excessive subdomain depth is a technique used to bury the real domain deep in the address.");
    }

    // Check for IP-like or numeric domain patterns
    if (/^\d{1,3}-\d{1,3}-\d{1,3}/.test(fromDomain) || /^\d+\./.test(fromDomain)) {
      domainFindings.push("The sender's domain contains IP-address-like patterns, which is unusual for legitimate senders.");
    }

    // Check for very long domain names (often randomly generated)
    var baseDomain = subdomainParts.slice(-2).join(".");
    if (baseDomain.length > 30) {
      domainFindings.push("The sender's base domain is unusually long (" + baseDomain.length + " characters). Randomly generated or auto-registered domains tend to be lengthy.");
    }

    // Check for hyphen-heavy domains (common in phishing: secure-login-microsoft-verify.com)
    var hyphenCount = (baseDomain.match(/-/g) || []).length;
    if (hyphenCount >= 3) {
      domainFindings.push("The sender's domain contains " + hyphenCount + " hyphens. Hyphen-heavy domains are a common phishing pattern where attackers string together trusted-looking words.");
    }

    // Check X-Mailer for bulk/unusual sending tools
    if (env.xMailer) {
      var mailer = env.xMailer.toLowerCase();
      if (/phpmailer|swiftmailer|massmailing|bulk/i.test(mailer)) {
        domainFindings.push("The X-Mailer header indicates bulk-sending software: \"" + env.xMailer + "\". This doesn't necessarily mean the email is malicious, but it's not a standard email client.");
      }
    }

    if (domainFindings.length > 0) {
      findings.push({
        id: "domain-reputation",
        severity: domainFindings.length >= 2 ? SEVERITY.WARN : SEVERITY.INFO,
        summary: "Domain reputation concern" + (domainFindings.length > 1 ? "s" : "") + " (" + fromDomain + ")",
        detail: domainFindings.join("\n\n"),
      });
    }
  }

  return findings;
}

/* ------------------------------------------------------------------ */
/*  Score Calculation                                                   */
/* ------------------------------------------------------------------ */

/**
 * Compute an overall threat score from 0 (safe) to 100 (very suspicious).
 * The score is an aggregation of individual check severities.
 *
 * @param {Array} checks
 * @param {Array} suspiciousIndicators
 * @param {Object} [weights] - Optional per-call weight map that overrides
 *                             the module defaults. Keys: pass, info, warn,
 *                             fail, critical. Any missing key falls back
 *                             to the module default.
 */
function calculateThreatScore(checks, suspiciousIndicators, weights) {
  var w = mergeWeights(weights);
  let score = 0;

  for (const check of checks) {
    score += w[check.severity] || 0;
  }

  for (const indicator of suspiciousIndicators) {
    score += w[indicator.severity] || 0;
  }

  // Clamp to 0–100
  return Math.min(100, Math.max(0, score));
}

/**
 * Produce a weight map by overlaying per-call overrides on the module
 * defaults. Returns a new object — never mutates SEVERITY_WEIGHT.
 */
function mergeWeights(overrides) {
  var merged = {};
  // Copy module defaults
  merged[SEVERITY.PASS] = SEVERITY_WEIGHT[SEVERITY.PASS];
  merged[SEVERITY.INFO] = SEVERITY_WEIGHT[SEVERITY.INFO];
  merged[SEVERITY.WARN] = SEVERITY_WEIGHT[SEVERITY.WARN];
  merged[SEVERITY.FAIL] = SEVERITY_WEIGHT[SEVERITY.FAIL];
  merged[SEVERITY.CRITICAL] = SEVERITY_WEIGHT[SEVERITY.CRITICAL];
  // Apply overrides (only if finite number)
  if (overrides && typeof overrides === "object") {
    if (typeof overrides.pass === "number") merged[SEVERITY.PASS] = overrides.pass;
    if (typeof overrides.info === "number") merged[SEVERITY.INFO] = overrides.info;
    if (typeof overrides.warn === "number") merged[SEVERITY.WARN] = overrides.warn;
    if (typeof overrides.fail === "number") merged[SEVERITY.FAIL] = overrides.fail;
    if (typeof overrides.critical === "number") merged[SEVERITY.CRITICAL] = overrides.critical;
  }
  return merged;
}

/**
 * Translate a numeric score into a human-readable verdict.
 */
function scoreToVerdict(score) {
  if (score <= 10) return { label: "Looks Legitimate", color: "#22c55e", icon: "shield-check" };
  if (score <= 30) return { label: "Likely Safe", color: "#84cc16", icon: "shield" };
  if (score <= 50) return { label: "Some Concerns", color: "#eab308", icon: "alert-triangle" };
  if (score <= 75) return { label: "Suspicious", color: "#f97316", icon: "alert-octagon" };
  return { label: "High Risk", color: "#ef4444", icon: "x-octagon" };
}

/**
 * Generate actionable "What should I do?" guidance based on the
 * analysis results. Returns an object with a headline, body text,
 * and a list of concrete action items.
 */
function generateGuidance(score, checks, suspiciousIndicators) {
  var actions = [];
  var headline = "";
  var body = "";

  // Check for ARC override scenario
  var hasArcOverride = checks.some(function (c) { return c.arcOverride; });
  var dmarcCheck = checks.find(function (c) { return c.id === "dmarc"; });
  var arcCheck = checks.find(function (c) { return c.id === "arc"; });
  var replyToMismatch = suspiciousIndicators.find(function (i) { return i.id === "reply-to-mismatch"; });

  if (score <= 10) {
    headline = "No action needed";
    body = "This email passed all authentication checks. The sender's identity has been verified through standard email security protocols.";
    actions.push("You can interact with this email normally — reply, click links, open attachments as you ordinarily would.");
    if (hasArcOverride) {
      actions.push("This email was relayed through a security gateway, which is normal for enterprise email. The original authentication was verified via ARC.");
    }
  } else if (score <= 30) {
    headline = "Probably fine — minor notes";
    body = "This email is most likely legitimate. There are minor informational findings, but nothing that suggests forgery or spoofing.";
    actions.push("You can interact with this email normally.");
    if (hasArcOverride) {
      actions.push("Authentication failures were caused by a trusted email relay (e.g., Mimecast, Proofpoint) and verified via ARC — this is normal enterprise email routing.");
    }
    actions.push("If the content itself seems unusual for this sender (unexpected tone, urgency, or requests), trust your instincts and verify through another channel.");
  } else if (score <= 50) {
    headline = "Review before acting";
    body = "Some authentication checks raised warnings. The email might be legitimate (misconfigured sender, mailing list, forwarded message), but extra caution is warranted.";
    actions.push("Do not click links or open attachments until you've considered whether this email is expected.");
    actions.push("If the email asks you to take action (log in, transfer money, provide information), verify the request through a separate channel — call the sender directly or message them on a known platform.");
    if (replyToMismatch) {
      actions.push("The Reply-To address differs from the From address. If you reply, your response will go to a different address than shown. Verify this is expected.");
    }
    actions.push("When in doubt, forward the email to your IT/security team for review.");
  } else if (score <= 75) {
    headline = "Treat with caution";
    body = "Multiple authentication checks failed. This email may be spoofed — the sender might not be who they claim to be.";
    actions.push("Do NOT click any links, open attachments, or follow instructions in this email.");
    actions.push("Do NOT reply to this email — especially with personal information, credentials, or financial details.");
    if (replyToMismatch) {
      actions.push("The Reply-To address is different from the displayed sender — replies would go to a potentially untrusted address.");
    }
    actions.push("Report this email to your IT/security team. In Outlook, you can also use the 'Report Phishing' button if available.");
    actions.push("If the email claims to be from someone you know, contact them through a known channel (phone, separate email, in person) to verify.");
  } else {
    headline = "Likely spoofed — do not interact";
    body = "Critical authentication failures were detected. This email has a high probability of being spoofed or malicious. The sender's identity could not be verified.";
    actions.push("Do NOT click any links, open any attachments, or follow any instructions in this email.");
    actions.push("Do NOT reply to this email under any circumstances.");
    actions.push("Report this email to your IT/security team immediately. In Outlook, use the 'Report Phishing' button if available, or forward to your organization's phishing reporting address.");
    actions.push("If you already clicked a link or opened an attachment, contact your IT/security team right away and change any passwords you may have entered.");
    if (dmarcCheck && dmarcCheck.severity === "critical") {
      actions.push("DMARC verification failed critically — the From address domain could not be authenticated, which is a strong indicator of spoofing.");
    }
  }

  return { headline: headline, body: body, actions: actions };
}

/* ------------------------------------------------------------------ */
/*  ARC (Authenticated Received Chain) Analysis                        */
/* ------------------------------------------------------------------ */

/**
 * Determine the ARC chain status from parsed headers.
 * Returns an object describing whether ARC is present and valid,
 * and what the original (earliest hop) authentication results were.
 */
function getArcStatus(parsedHeaders) {
  var arcAuth = parsedHeaders.arcAuthResults || {};
  var arcSeals = parsedHeaders.arcSeals || [];
  var origAuth = parsedHeaders.origAuthResults || [];

  var instances = Object.keys(arcAuth).map(Number).sort(function (a, b) { return a - b; });
  var hasArc = instances.length > 0 || arcSeals.length > 0;

  if (!hasArc) {
    return { present: false, valid: false, instances: 0, originalResults: [], allResults: arcAuth };
  }

  // Check if the latest ARC-Seal has cv=pass (chain validation)
  // The first seal (i=1) has cv=none, subsequent have cv=pass if chain is valid
  var chainValid = false;
  if (arcSeals.length > 0) {
    var lastSeal = arcSeals[arcSeals.length - 1];
    // If we have multiple seals, the last one's cv should be "pass"
    // If only one seal (i=1), cv="none" is expected and valid
    if (arcSeals.length === 1 && lastSeal.chainValidation === "none") {
      chainValid = true;
    } else if (lastSeal.chainValidation === "pass") {
      chainValid = true;
    }
  }

  // Also check if the final Authentication-Results has arc=pass
  var finalArcResult = parsedHeaders.authResults.find(function (r) {
    return r.method === "arc";
  });
  if (finalArcResult && finalArcResult.result === "pass") {
    chainValid = true;
  }

  // Get earliest hop results (i=1) — these are from the origin
  var originalResults = arcAuth[1] || origAuth || [];

  // Check what the original hop saw for each method
  var originalSpf = originalResults.find(function (r) { return r.method === "spf"; });
  var originalDkim = originalResults.find(function (r) { return r.method === "dkim"; });
  var originalDmarc = originalResults.find(function (r) { return r.method === "dmarc"; });

  return {
    present: true,
    valid: chainValid,
    instances: instances.length,
    sealCount: arcSeals.length,
    originalResults: originalResults,
    originalSpf: originalSpf,
    originalDkim: originalDkim,
    originalDmarc: originalDmarc,
    allResults: arcAuth,
  };
}

/**
 * Produce a CheckResult for the ARC chain itself.
 */
function checkARC(parsedHeaders) {
  var arc = getArcStatus(parsedHeaders);

  if (!arc.present) {
    return {
      id: "arc",
      title: "ARC Chain",
      severity: SEVERITY.INFO,
      summary: "No ARC headers present",
      detail: "This email did not pass through any ARC-signing intermediaries. ARC is not required — it is only relevant when email is relayed through services like Mimecast, Proofpoint, Google Groups, or mailing lists.",
      education: EDUCATION.arc,
    };
  }

  if (arc.valid) {
    var origPassed = [];
    if (arc.originalSpf && arc.originalSpf.result === "pass") origPassed.push("SPF");
    if (arc.originalDkim && arc.originalDkim.result === "pass") origPassed.push("DKIM");
    if (arc.originalDmarc && arc.originalDmarc.result === "pass") origPassed.push("DMARC");

    var origSummary = origPassed.length > 0
      ? "Original authentication at first hop: " + origPassed.join(", ") + " passed."
      : "Original authentication results are recorded in the ARC chain.";

    return {
      id: "arc",
      title: "ARC Chain",
      severity: SEVERITY.PASS,
      summary: "ARC chain validated (" + arc.sealCount + " seals, chain intact)",
      detail: "The ARC chain of custody is intact and validated. This email passed through " + arc.sealCount + " ARC-signing intermediaries (such as a security gateway or mailing list) and the chain verifies. " + origSummary + "\n\nWhen SPF/DKIM/DMARC fail at the final destination but ARC passes, it typically means a trusted intermediary modified the message (e.g., added a disclaimer, scanned attachments) which broke the original signatures. The ARC chain proves the email was originally authenticated.",
      education: EDUCATION.arc,
      arcStatus: arc,
    };
  }

  return {
    id: "arc",
    title: "ARC Chain",
    severity: SEVERITY.WARN,
    summary: "ARC present but chain validation failed",
    detail: "ARC headers are present (" + arc.sealCount + " seals) but the chain could not be validated. This may mean the chain was tampered with or a seal is missing.",
    education: EDUCATION.arc,
    arcStatus: arc,
  };
}

/**
 * Apply ARC overrides: when the final-hop authentication fails but ARC
 * proves the original hop passed, downgrade severity and annotate the check.
 */
function applyArcOverrides(checks, parsedHeaders) {
  var arc = getArcStatus(parsedHeaders);
  if (!arc.present || !arc.valid) return checks;

  var overrideMap = {
    spf: arc.originalSpf,
    dkim: arc.originalDkim,
    dmarc: arc.originalDmarc,
  };

  for (var i = 0; i < checks.length; i++) {
    var check = checks[i];
    var originalResult = overrideMap[check.id];

    // Only override if the check failed/warned AND the original hop passed
    if (!originalResult || originalResult.result !== "pass") continue;
    if (check.severity !== SEVERITY.FAIL && check.severity !== SEVERITY.CRITICAL && check.severity !== SEVERITY.WARN) continue;

    var label = check.id.toUpperCase();
    check.severity = SEVERITY.PASS;
    check.summary = label + " failed at final hop, but PASSED at origin (ARC validated)";
    check.detail = "The final mail server recorded a " + label + " failure, likely because the email was relayed through an intermediary (security gateway, mailing list, etc.) that modified the message or changed the sending IP.\n\nHowever, the ARC (Authenticated Received Chain) proves that " + label + " passed at the original hop before the intermediary handled it. The ARC chain is intact and validated, so the original authentication is trustworthy.\n\nOriginal result: " + label + " = pass" + (check.detail ? "\n\nFinal-hop detail: " + check.detail : "");
    check.arcOverride = true;
  }

  return checks;
}

/**
 * Apply internal email overrides: when the email is from within the same
 * M365 tenant, SPF/DKIM/DMARC "none" results are expected and should not
 * be scored as warnings.
 */
function applyInternalOverrides(checks, parsedHeaders) {
  var internal = parsedHeaders.internalSignals;
  if (!internal || !internal.isInternal) return checks;

  var authIds = ["spf", "dkim", "dmarc"];

  for (var i = 0; i < checks.length; i++) {
    var check = checks[i];
    if (authIds.indexOf(check.id) === -1) continue;
    if (check.severity !== SEVERITY.WARN && check.severity !== SEVERITY.FAIL) continue;

    // Only override "none/no result" type warnings, not actual failures on internal mail
    var isNoneResult = !check.rawResult || (check.rawResult && check.rawResult.result === "none");
    if (!isNoneResult && check.rawResult) continue;

    var label = check.id.toUpperCase();
    check.severity = SEVERITY.PASS;
    check.summary = label + " not applicable — internal email (same organization)";
    check.detail = "This is an internal email that never left your organization's Exchange Online servers. " + label + " authentication is designed for email crossing organizational boundaries and is not performed on internal messages.\n\nExchange verified the sender through its own internal authentication (AuthAs: Internal, mechanism: Organization trust).\n\nThis is completely normal and expected.";
    check.education = EDUCATION.internal;
    check.internalOverride = true;
  }

  return checks;
}

/* ------------------------------------------------------------------ */
/*  Main Analysis Entry Point                                          */
/* ------------------------------------------------------------------ */

/**
 * Run all checks against parsed headers and return a full report.
 *
 * @param {ParsedHeaders} parsedHeaders - Output from parseAllHeaders()
 * @returns {AnalysisReport}
 */
function analyzeEmail(parsedHeaders, config) {
  config = config || {};

  // Build per-call weight map — never mutate the module-scope SEVERITY_WEIGHT,
  // otherwise config overrides leak into subsequent calls.
  var weights = mergeWeights(config.scoringWeights);

  var checks = [
    checkSPF(parsedHeaders),
    checkDKIM(parsedHeaders),
    checkDMARC(parsedHeaders),
    checkAlignment(parsedHeaders),
    checkARC(parsedHeaders),
    checkClassification(parsedHeaders),
  ];

  checks = applyArcOverrides(checks, parsedHeaders);
  checks = applyInternalOverrides(checks, parsedHeaders);

  var suspiciousIndicators = checkSuspiciousIndicators(parsedHeaders, config);
  var score = calculateThreatScore(checks, suspiciousIndicators, weights);
  var verdict = scoreToVerdict(score);
  var guidance = generateGuidance(score, checks, suspiciousIndicators);

  // Add report phishing action from config
  if (config.reportPhishingUrl && score > 30) {
    guidance.reportUrl = config.reportPhishingUrl;
    guidance.reportLabel = config.reportPhishingLabel || "Report Phishing";
  }

  return {
    version: "1.3.1",
    timestamp: new Date().toISOString(),
    score, verdict, guidance, checks, suspiciousIndicators,
    envelope: parsedHeaders.envelope,
    bulkSignals: parsedHeaders.bulkSignals,
    receivedChain: parsedHeaders.receivedChain,
    rawHeaderCount: Object.keys(parsedHeaders.raw).length,
    config: config,
    // Expose weights used so the caller (taskpane.js) can score any
    // additional findings (e.g. URL scan) with the same effective weights.
    effectiveWeights: weights,
  };
}

/* ------------------------------------------------------------------ */
/*  Exports                                                            */
/* ------------------------------------------------------------------ */
if (typeof module !== "undefined" && module.exports) {
  module.exports = {
    analyzeEmail,
    checkSPF,
    checkDKIM,
    checkDMARC,
    checkAlignment,
    checkARC,
    checkClassification,
    checkSuspiciousIndicators,
    getArcStatus,
    applyArcOverrides,
    applyInternalOverrides,
    generateGuidance,
    calculateThreatScore,
    mergeWeights,
    scoreToVerdict,
    doDomainsAlign,
    EDUCATION,
    SEVERITY,
  };
}

</script>
<script>
/**
 * taskpane.js
 * Email Inspector v1.3.1
 *
 * Main controller for the Outlook taskpane UI.
 * Dependencies (loaded via <script> in taskpane.html):
 *   - header-parser.js     → parseAllHeaders()
 *   - phishing-detector.js → detectPhishingSignals()
 *   - analysis-engine.js   → analyzeEmail()
 */

/* ------------------------------------------------------------------ */
/*  State                                                              */
/* ------------------------------------------------------------------ */
let currentReport = null;
let rawHeaderText = "";
let adminConfig = {};

/* ------------------------------------------------------------------ */
/*  Config Loading                                                     */
/* ------------------------------------------------------------------ */

/**
 * Attempt to load config.json from the same directory as the taskpane.
 * Falls back to empty config (all defaults) on any error.
 */
function loadConfig() {
  return new Promise(function (resolve) {
    try {
      var configUrl = (window.location.href.replace(/[^/]*$/, "") + "config.json").replace(/([^:])\/\//g, "$1/");
      fetch(configUrl, { cache: "no-store" })
        .then(function (r) { return r.ok ? r.json() : {}; })
        .then(function (data) { resolve(data || {}); })
        .catch(function () { resolve({}); });
    } catch (e) {
      resolve({});
    }
  });
}

/* ------------------------------------------------------------------ */
/*  Office.js Initialization                                           */
/* ------------------------------------------------------------------ */

Office.onReady(function (info) {
  if (info.host === Office.HostType.Outlook) {
    runInspection();
  } else {
    showError("This add-in only works in Microsoft Outlook.");
  }
});

/**
 * Main flow: load config → retrieve headers → parse → analyze → render.
 */
async function runInspection() {
  const app = document.getElementById("app");
  showLoading();

  try {
    // Load admin config in parallel with header retrieval
    var configPromise = loadConfig();
    var headerPromise = getInternetHeaders();

    adminConfig = await configPromise;
    rawHeaderText = await headerPromise;

    if (!rawHeaderText || rawHeaderText.trim().length === 0) {
      showError(
        "Could not retrieve email headers. This may happen if the message " +
        "is a draft, in the Sent folder, or if your Outlook version does not " +
        "support the required API (Mailbox requirement set 1.8+)."
      );
      return;
    }

    const parsed = parseAllHeaders(rawHeaderText);
    currentReport = analyzeEmail(parsed, adminConfig);

    // Attempt URL scanning from message body (graceful degradation)
    try {
      var bodyHtml = await getMessageBody();
      if (bodyHtml && typeof scanUrls === "function") {
        var urlResults = scanUrls(bodyHtml, parsed.envelope, adminConfig);
        currentReport.urlScan = urlResults;
        // Merge URL findings into suspicious indicators and rescore
        if (urlResults.findings && urlResults.findings.length > 0) {
          for (var u = 0; u < urlResults.findings.length; u++) {
            currentReport.suspiciousIndicators.push(urlResults.findings[u]);
          }
          // Use the engine's effective weights (already respects adminConfig)
          // so we don't duplicate or partially re-apply scoringWeights here.
          var weights = currentReport.effectiveWeights || { pass: 0, info: 0, warn: 15, fail: 30, critical: 50 };
          var extraScore = 0;
          for (var us = 0; us < urlResults.findings.length; us++) {
            extraScore += weights[urlResults.findings[us].severity] || 0;
          }
          currentReport.score = Math.min(100, currentReport.score + extraScore);
          // Recalculate verdict using the engine's canonical function so
          // thresholds/colors live in exactly one place.
          currentReport.verdict = scoreToVerdict(currentReport.score);
        }
      }
    } catch (bodyErr) {
      // Body access failed — continue without URL scanning
      console.log("[Email Inspector] Body scan skipped:", bodyErr.message || bodyErr);
    }

    renderReport(currentReport);

    // Show tooltip tour on first use
    if (adminConfig.features && adminConfig.features.showTooltipTour !== false) {
      showTooltipTourIfFirstRun();
    }
  } catch (err) {
    console.error("[Email Inspector] Analysis failed:", err);
    showError(
      "An error occurred while analyzing this email. " +
      "Details: " + (err.message || String(err))
    );
  }
}

/**
 * Retrieve all internet headers from the currently open message.
 * Uses Office.js getAllInternetHeadersAsync (Requirement Set 1.8).
 *
 * Falls back to getInitializationContextAsync + REST for older clients
 * (documented but not implemented in this version).
 */
function getInternetHeaders() {
  return new Promise(function (resolve, reject) {
    var item = Office.context.mailbox.item;

    if (!item) {
      reject(new Error("No message is currently selected."));
      return;
    }

    // Check for getAllInternetHeadersAsync support
    if (typeof item.getAllInternetHeadersAsync === "function") {
      item.getAllInternetHeadersAsync(function (result) {
        if (result.status === Office.AsyncResultStatus.Succeeded) {
          resolve(result.value);
        } else {
          reject(new Error(
            "Failed to retrieve headers: " +
            (result.error ? result.error.message : "Unknown error")
          ));
        }
      });
    } else {
      // Fallback: attempt to use REST API
      attemptRestFallback(item).then(resolve).catch(function () {
        reject(new Error(
          "Your version of Outlook does not support header retrieval. " +
          "Requirement set Mailbox 1.8 or later is needed."
        ));
      });
    }
  });
}

/**
 * Fallback header retrieval via Outlook REST API.
 * Requires getCallbackTokenAsync permission.
 */
function attemptRestFallback(item) {
  return new Promise(function (resolve, reject) {
    if (!Office.context.mailbox.getCallbackTokenAsync) {
      reject(new Error("REST fallback not available"));
      return;
    }

    Office.context.mailbox.getCallbackTokenAsync({ isRest: true }, function (tokenResult) {
      if (tokenResult.status !== Office.AsyncResultStatus.Succeeded) {
        reject(new Error("Could not obtain REST token"));
        return;
      }

      var token = tokenResult.value;
      var restUrl = Office.context.mailbox.restUrl;
      var itemId = Office.context.mailbox.convertToRestId(
        item.itemId,
        Office.MailboxEnums.RestVersion.v2_0
      );

      var url = restUrl + "/v2.0/me/messages/" + itemId + "?$select=InternetMessageHeaders";

      fetch(url, {
        headers: { Authorization: "Bearer " + token },
      })
        .then(function (resp) { return resp.json(); })
        .then(function (data) {
          if (data.InternetMessageHeaders) {
            var headerStr = data.InternetMessageHeaders
              .map(function (h) { return h.Name + ": " + h.Value; })
              .join("\r\n");
            resolve(headerStr);
          } else {
            reject(new Error("No headers in REST response"));
          }
        })
        .catch(reject);
    });
  });
}

/**
 * Retrieve the message body as HTML for URL scanning.
 * Uses body.getAsync with ReadItem permission.
 * Returns null if body access is unavailable.
 */
function getMessageBody() {
  return new Promise(function (resolve, reject) {
    var item = Office.context.mailbox.item;
    if (!item || !item.body || typeof item.body.getAsync !== "function") {
      resolve(null);
      return;
    }

    item.body.getAsync(Office.CoercionType.Html, function (result) {
      if (result.status === Office.AsyncResultStatus.Succeeded) {
        resolve(result.value);
      } else {
        resolve(null); // Graceful — don't reject, just skip
      }
    });
  });
}

function renderReport(report) {
  var app = document.getElementById("app");
  var html = "";

  // Header
  html += '<div class="app-header">';
  html +=   '<svg class="app-header__icon" viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="13" stroke="currentColor" stroke-width="2"/><path d="M14 8v6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="14" cy="19" r="1.5" fill="currentColor"/></svg>';
  html +=   '<div class="app-header__title">Email Inspector <span class="app-header__version">v1.3.1</span></div>';
  html += '</div>';

  // Score banner
  html += renderScoreBanner(report);

  // What should I do? guidance
  if (report.guidance) {
    html += renderGuidance(report.guidance, report.verdict);
  }

  // Message origin + email details — combined section
  var isInternal = report.checks && report.checks.some(function (c) { return c.internalOverride; });
  html += '<div class="message-info">';
  html += '<div class="message-info__origin">';
  html += '<span class="origin-line__label">Message Origin:</span> ';
  if (isInternal) {
    html += '<span class="origin-badge origin-badge--internal">🏢 Internal</span>';
  } else {
    html += '<span class="origin-badge origin-badge--external">🌐 External</span>';
  }
  html += '</div>';
  if (report.envelope) {
    html += '<div class="message-info__from">From: ' + escapeHtml(decodeMimeHeader(report.envelope.from || "Unknown")) + '</div>';
    if (report.envelope.subject) {
      html += '<div class="message-info__subject">Subject: ' + escapeHtml(decodeMimeHeader(report.envelope.subject)) + '</div>';
    }
  }
  html += '</div>';

  // Unsubscribe action
  if (report.bulkSignals && (report.bulkSignals.listUnsubscribeUrls.length > 0 || report.bulkSignals.listUnsubscribeMailto)) {
    html += renderUnsubscribe(report.bulkSignals);
  }

  // URL scan summary — above auth checks for user visibility (collapsible)
  if (report.urlScan && report.urlScan.stats.totalLinks > 0) {
    var us = report.urlScan.stats;
    var scanLabel = us.totalLinks + " link" + (us.totalLinks !== 1 ? "s" : "") + " scanned";
    if (us.gatewayWrapped > 0) scanLabel += " · " + us.gatewayWrapped + " protected";
    if (us.shortenedLinks > 0) scanLabel += " · " + us.shortenedLinks + " shortened";
    if (us.mismatchedText > 0) scanLabel += " · ⚠ " + us.mismatchedText + " mismatched";

    html += '<div class="collapsible-section" id="urlSection">';
    html +=   '<div class="collapsible-section__header" onclick="toggleSection(\'urlSection\')">';
    html +=     '<div class="section-heading" style="margin:0">🔗 Link Analysis (' + scanLabel + ')</div>';
    html +=     '<div class="collapsible-section__chevron">▶</div>';
    html +=   '</div>';
    html +=   '<div class="collapsible-section__body">';
    html +=     renderUrlScanDetails(report.urlScan);
    html +=   '</div>';
    html += '</div>';
  }

  // Authentication checks — two-column grid
  html += '<div class="section-heading">Authentication Checks</div>';
  html += '<div class="checks-grid" id="checksGrid">';
  for (var i = 0; i < report.checks.length; i++) {
    html += renderCheckCard(report.checks[i], "check-" + i);
  }
  html += '</div>';

  // Suspicious indicators
  if (report.suspiciousIndicators.length > 0) {
    html += '<div class="section-heading">Suspicious Indicators</div>';
    for (var j = 0; j < report.suspiciousIndicators.length; j++) {
      html += renderCheckCard(report.suspiciousIndicators[j], "sus-" + j);
    }
  }

  // Routing — collapsible
  if (report.receivedChain && report.receivedChain.length > 0) {
    html += '<div class="collapsible-section" id="routingSection">';
    html +=   '<div class="collapsible-section__header" onclick="toggleSection(\'routingSection\')">';
    html +=     '<div class="section-heading" style="margin:0">Mail Routing (' + report.receivedChain.length + ' hops)</div>';
    html +=     '<div class="collapsible-section__chevron">▶</div>';
    html +=   '</div>';
    html +=   '<div class="collapsible-section__body">';
    html +=     renderRoutingChain(report.receivedChain);
    html +=   '</div>';
    html += '</div>';
  }

  // Action buttons row
  html += '<div class="action-buttons">';
  html +=   '<button class="btn btn--ghost action-btn" onclick="copyReport()">📋 Copy</button>';
  html +=   '<button class="btn btn--ghost action-btn" onclick="printReport()">📄 PDF Report</button>';
  if (report.guidance && report.guidance.reportUrl) {
    html += '<a class="btn btn--ghost action-btn" href="' + escapeHtml(report.guidance.reportUrl) + '" target="_blank">🚨 ' + escapeHtml(report.guidance.reportLabel || "Report Phishing") + '</a>';
  }
  html += '</div>';

  // Raw headers toggle
  html += '<button class="raw-headers-toggle" onclick="toggleRawHeaders()" id="rawToggle">';
  html +=   'Show Raw Headers (' + report.rawHeaderCount + ' header fields)';
  html += '</button>';
  html += '<div class="raw-headers-content" id="rawHeaders">' + escapeHtml(rawHeaderText) + '</div>';

  // Footer
  html += '<div class="app-footer">';
  html +=   'Email Inspector v1.3.1 &middot; Analysis performed at ' + formatTime(report.timestamp);
  html += '</div>';

  app.innerHTML = html;
}

function renderScoreBanner(report) {
  var score = report.score;
  var verdict = report.verdict;
  var circumference = 2 * Math.PI * 28; // radius 28
  var offset = circumference - (score / 100) * circumference;

  var descriptions = {
    "Looks Legitimate": "All authentication checks passed. This email appears to be from a verified sender.",
    "Likely Safe": "Most checks passed with minor notes. This email is probably legitimate.",
    "Some Concerns": "Some authentication checks raised warnings. Review the details below.",
    "Suspicious": "Multiple checks failed or raised warnings. Treat this email with caution.",
    "High Risk": "Critical authentication failures detected. This email may be spoofed or malicious.",
  };

  var html = '<div class="score-banner">';
  html +=   '<div class="score-ring">';
  html +=     '<svg class="score-ring__svg" viewBox="0 0 64 64">';
  html +=       '<circle class="score-ring__bg" cx="32" cy="32" r="28"/>';
  html +=       '<circle class="score-ring__fill" cx="32" cy="32" r="28" ' +
                  'stroke="' + verdict.color + '" ' +
                  'stroke-dasharray="' + circumference + '" ' +
                  'stroke-dashoffset="' + offset + '"/>';
  html +=     '</svg>';
  html +=     '<div class="score-ring__label" style="color:' + verdict.color + '">' + score + '</div>';
  html +=   '</div>';
  html +=   '<div class="score-banner__text">';
  html +=     '<div class="score-banner__verdict" style="color:' + verdict.color + '">' + escapeHtml(verdict.label) + '</div>';
  html +=     '<div class="score-banner__description">' + escapeHtml(descriptions[verdict.label] || "") + '</div>';
  html +=   '</div>';
  html += '</div>';

  return html;
}

function renderGuidance(guidance, verdict) {
  var html = '<div class="guidance-box" style="border-left-color:' + verdict.color + '">';
  html +=   '<div class="guidance-box__header" onclick="toggleGuidance()">';
  html +=     '<div class="guidance-box__icon">💡</div>';
  html +=     '<div class="guidance-box__headline">What should I do?</div>';
  html +=     '<div class="guidance-box__toggle" id="guidanceChevron">▶</div>';
  html +=   '</div>';

  html +=     '<div class="guidance-box__subhead">' + escapeHtml(guidance.headline) + '</div>';

function renderUnsubscribe(bulkSignals) {

  if (bulkSignals.listUnsubscribeUrls.length > 0) {

function renderUrlScanDetails(urlScan) {
  var html = '<div class="url-scan-details">';

  if (urlScan.links && urlScan.links.length > 0) {
    // Group links by status
    var flagged = urlScan.links.filter(function (l) { return l.flags.length > 0; });
    var clean = urlScan.links.filter(function (l) { return l.flags.length === 0; });

    // Flagged links — shown first, each individually
    if (flagged.length > 0) {
      html += '<div class="url-scan-group">';
      html += '<div class="url-scan-group__label" style="color:var(--color-warn)">⚠ Flagged links</div>';
      for (var f = 0; f < flagged.length; f++) {
        var fl = flagged[f];
        var badges = fl.flags.map(function (flag) {
          var colors = { "shortened": "warn", "suspicious-tld": "warn", "mismatched-text": "fail" };
          var labels = { "shortened": "shortened", "suspicious-tld": "suspicious TLD", "mismatched-text": "mismatched URL" };
          return '<span class="url-badge url-badge--' + (colors[flag] || "warn") + '">' + (labels[flag] || flag) + '</span>';
        }).join(" ");
        var displayDomain = fl.effectiveDomain || fl.domain;
        html += '<div class="url-scan-item url-scan-item--flagged">';
        html += '<div class="url-scan-item__domain">' + escapeHtml(displayDomain) + ' ' + badges + '</div>';
        if (fl.mismatch) {
          html += '<div class="url-scan-item__mismatch">Shows: <strong>' + escapeHtml(fl.mismatch.displayedDomain) + '</strong> → Goes to: <strong>' + escapeHtml(fl.mismatch.actualDomain) + '</strong></div>';
        }
        if (fl.gateway) html += '<div class="url-scan-item__meta">🛡 Wrapped by ' + escapeHtml(fl.gateway) + '</div>';
        if (fl.text) html += '<div class="url-scan-item__text">"' + escapeHtml(fl.text.substring(0, 80)) + (fl.text.length > 80 ? "…" : "") + '"</div>';
        html += '<a class="url-scan-item__link" href="' + escapeHtml(fl.href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(fl.href.substring(0, 70)) + (fl.href.length > 70 ? "…" : "") + '</a>';
        html += '</div>';
      }
      html += '</div>';
    }

    // Clean links — all listed and clickable
    if (clean.length > 0) {
      html += '<div class="url-scan-group">';
      html += '<div class="url-scan-group__label" style="color:var(--color-pass)">✓ Clean links (' + clean.length + ')</div>';
      // Deduplicate by effective domain, keep all links
      for (var c = 0; c < clean.length; c++) {
        var cl = clean[c];
        var clDomain = cl.effectiveDomain || cl.domain;
        html += '<div class="url-scan-item">';
        html += '<div class="url-scan-item__row">';
        if (cl.gateway) {
          html += '<span class="url-badge url-badge--pass">🛡 ' + escapeHtml(cl.gateway) + '</span> ';
        }
        html += '<span class="url-scan-item__domain-inline">' + escapeHtml(clDomain) + '</span>';
        html += '</div>';
        if (cl.text && cl.text.length > 0 && cl.text.toLowerCase() !== cl.href.toLowerCase()) {
          html += '<div class="url-scan-item__text">"' + escapeHtml(cl.text.substring(0, 60)) + (cl.text.length > 60 ? "…" : "") + '"</div>';
        }
        html += '<a class="url-scan-item__link" href="' + escapeHtml(cl.href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(cl.href.substring(0, 70)) + (cl.href.length > 70 ? "…" : "") + '</a>';
        html += '</div>';
      }
      html += '</div>';
    }
  }

  html += '</div>';
  return html;
}

    info: "i",

    fail: "✗",

  var html = '<div class="check-card check-card--' + severity + '" id="' + cardId + '">';

  // Clickable header
  html += '<div class="check-card__header" onclick="toggleCard(\'' + cardId + '\')">';

  html +=   '<div class="check-card__title">' + escapeHtml(check.title || check.id || "Check") + '</div>';
  html +=   '<div class="check-card__chevron">▶</div>';

  // Expandable body
  html += '<div class="check-card__body">';

function renderRoutingChain(hops) {
  var html = '<ul class="routing-list">';

  // Hops are newest-first; display oldest first for logical flow
  for (var i = hops.length - 1; i >= 0; i--) {
    var hop = hops[i];
    var tlsClass = hop.tls ? "routing-list__item--tls" : (hop.protocol ? "routing-list__item--no-tls" : "");

    html += '<li class="routing-list__item ' + tlsClass + '">';
    if (hop.from) {
      html += '<div class="routing-list__server">From: ' + escapeHtml(hop.from) + '</div>';
    }
    if (hop.by) {
      html += '<div class="routing-list__server">By: ' + escapeHtml(hop.by) + '</div>';
    }
    var meta = [];
    if (hop.protocol) meta.push(hop.protocol + (hop.tls ? " 🔒" : " ⚠️"));
    if (hop.timestamp) meta.push(hop.timestamp);
    if (meta.length > 0) {
      html += '<div class="routing-list__meta">' + escapeHtml(meta.join(" · ")) + '</div>';
    }
    html += '</li>';
  }

  html += '</ul>';
  return html;
}

/* ------------------------------------------------------------------ */
/*  Utilities                                                          */
/* ------------------------------------------------------------------ */

function escapeHtml(str) {
  if (!str) return "";
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

/**
 * Decode MIME encoded-word headers (RFC 2047).
 * Handles =?charset?Q?...?= (quoted-printable) and =?charset?B?...?= (base64).
 */
function decodeMimeHeader(str) {
  if (!str) return "";
  return str.replace(/=\?([^?]+)\?(Q|B)\?([^?]*)\?=/gi, function (match, charset, encoding, data) {
    if (encoding.toUpperCase() === "Q") {
      // Quoted-printable: underscores = spaces, =XX = hex byte
      var decoded = data.replace(/_/g, " ").replace(/=([0-9A-Fa-f]{2})/g, function (m, hex) {
        return String.fromCharCode(parseInt(hex, 16));
      });
      return decoded;
    } else if (encoding.toUpperCase() === "B") {
      // Base64
      try { return atob(data); } catch (e) { return data; }
    }
    return data;
  });
}

function formatTime(isoString) {
  try {
    var d = new Date(isoString);
    return d.toLocaleTimeString(undefined, { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  } catch (e) {
    return isoString;
  }
}

/*  Copy Report to Clipboard                                           */
