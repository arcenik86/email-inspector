function copyReport() {
  if (!currentReport) return;
  var r = currentReport;
  var lines = [];

  lines.push("═══════════════════════════════════════");
  lines.push("  EMAIL INSPECTOR REPORT  v" + r.version);
  lines.push("═══════════════════════════════════════");
  lines.push("");
  lines.push("Score:   " + r.score + "/100 — " + r.verdict.label);
  lines.push("Date:    " + r.timestamp);
  lines.push("");

  // Envelope
  lines.push("── Email Details ──");
  if (r.envelope.from) lines.push("From:    " + decodeMimeHeader(r.envelope.from));
  if (r.envelope.to) lines.push("To:      " + r.envelope.to);
  if (r.envelope.subject) lines.push("Subject: " + decodeMimeHeader(r.envelope.subject));
  if (r.envelope.date) lines.push("Date:    " + r.envelope.date);
  if (r.envelope.returnPath) lines.push("Return-Path: " + r.envelope.returnPath);
  lines.push("");

  // Checks
  lines.push("── Authentication Checks ──");
  for (var i = 0; i < r.checks.length; i++) {
    var c = r.checks[i];
    var icon = { pass: "✓", info: "ℹ", warn: "⚠", fail: "✗", critical: "✗" }[c.severity] || "?";
    lines.push("  " + icon + " " + c.title + ": " + c.summary);
  }
  lines.push("");

  // Suspicious indicators
  if (r.suspiciousIndicators.length > 0) {
    lines.push("── Suspicious Indicators ──");
    for (var j = 0; j < r.suspiciousIndicators.length; j++) {
      var si = r.suspiciousIndicators[j];
      var siIcon = { pass: "✓", info: "ℹ", warn: "⚠", fail: "✗", critical: "✗" }[si.severity] || "?";
      lines.push("  " + siIcon + " " + (si.title || si.id) + ": " + si.summary);
    }
    lines.push("");
  }

  // Guidance
  if (r.guidance) {
    lines.push("── Recommendation ──");
    lines.push(r.guidance.headline);
    lines.push(r.guidance.body);
    lines.push("");
  }

  // Routing summary
  if (r.receivedChain && r.receivedChain.length > 0) {
    lines.push("── Routing (" + r.receivedChain.length + " hops) ──");
    for (var k = r.receivedChain.length - 1; k >= 0; k--) {
      var hop = r.receivedChain[k];
      var hopLine = "  " + (r.receivedChain.length - k) + ". ";
      if (hop.from) hopLine += hop.from;
      if (hop.by) hopLine += " → " + hop.by;
      if (hop.protocol) hopLine += " [" + hop.protocol + (hop.tls ? " 🔒" : "") + "]";
      lines.push(hopLine);
    }
    lines.push("");
  }

  lines.push("Generated by Email Inspector v" + r.version);

  var text = lines.join("\n");

  // Copy to clipboard
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function () {
      showCopyFeedback("Copied!");
    }).catch(function () {
      fallbackCopy(text);
    });
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  var ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.left = "-9999px";
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand("copy");
    showCopyFeedback("Copied!");
  } catch (e) {
    showCopyFeedback("Copy failed");
  }
  document.body.removeChild(ta);
}

function showCopyFeedback(message) {
  var btn = document.querySelector(".action-btn");
  if (!btn) return;
  var original = btn.innerHTML;
  btn.innerHTML = "✓ " + message;
  btn.classList.add("action-btn--success");
  setTimeout(function () {
    btn.innerHTML = original;
    btn.classList.remove("action-btn--success");
  }, 2000);
}

/* ------------------------------------------------------------------ */
/*  Printable PDF Report                                               */
/* ------------------------------------------------------------------ */

function printReport() {
  if (!currentReport) return;
  var r = currentReport;
  var orgName = (adminConfig && adminConfig.orgName) || "Email Inspector";
  var verdictColor = r.verdict.color;
  var isInternal = r.checks && r.checks.some(function (c) { return c.internalOverride; });

  // Build full check sections with details
  var checkSections = "";
  for (var i = 0; i < r.checks.length; i++) {
    var c = r.checks[i];
    var icon = { pass: "✓", info: "ℹ", warn: "⚠", fail: "✗", critical: "✗" }[c.severity] || "?";
    var label = { pass: "PASS", info: "INFO", warn: "WARN", fail: "FAIL", critical: "CRITICAL" }[c.severity] || "";
    var rowColor = { pass: "#16a34a", info: "#2563eb", warn: "#d97706", fail: "#dc2626", critical: "#991b1b" }[c.severity] || "#666";
    checkSections += '<div class="check">';
    checkSections += '<div class="check-header"><span class="check-badge" style="color:' + rowColor + '">' + icon + ' ' + label + '</span> <strong>' + escapeHtml(c.title) + '</strong></div>';
    checkSections += '<div class="check-summary">' + escapeHtml(c.summary) + '</div>';
    if (c.detail) {
      checkSections += '<div class="check-detail">' + escapeHtml(c.detail).replace(/\n/g, "<br>") + '</div>';
    }
    checkSections += '</div>';
  }

  // Build indicator sections with details
  var indicatorSections = "";
  for (var j = 0; j < r.suspiciousIndicators.length; j++) {
    var si = r.suspiciousIndicators[j];
    var siIcon = { pass: "✓", info: "ℹ", warn: "⚠", fail: "✗", critical: "✗" }[si.severity] || "?";
    var siLabel = (si.severity || "").toUpperCase();
    var siColor = { pass: "#16a34a", info: "#2563eb", warn: "#d97706", fail: "#dc2626", critical: "#991b1b" }[si.severity] || "#666";
    indicatorSections += '<div class="check">';
    indicatorSections += '<div class="check-header"><span class="check-badge" style="color:' + siColor + '">' + siIcon + ' ' + siLabel + '</span> <strong>' + escapeHtml(si.title || si.id) + '</strong></div>';
    indicatorSections += '<div class="check-summary">' + escapeHtml(si.summary) + '</div>';
    if (si.detail) {
      indicatorSections += '<div class="check-detail">' + escapeHtml(si.detail).replace(/\n/g, "<br>") + '</div>';
    }
    indicatorSections += '</div>';
  }

  // Build full routing table
  var routingSection = "";
  if (r.receivedChain && r.receivedChain.length > 0) {
    routingSection += '<table class="routing-table">';
    routingSection += '<tr><th>#</th><th>From</th><th>By</th><th>Protocol</th><th>TLS</th><th>Timestamp</th></tr>';
    for (var k = r.receivedChain.length - 1; k >= 0; k--) {
      var hop = r.receivedChain[k];
      var hopNum = r.receivedChain.length - k;
      var tlsCell = hop.tls ? '<span style="color:#16a34a">Yes 🔒</span>' : (hop.protocol ? '<span style="color:#d97706">No</span>' : '<span style="color:#999">—</span>');
      routingSection += '<tr>';
      routingSection += '<td style="text-align:center;color:#999;width:30px">' + hopNum + '</td>';
      routingSection += '<td class="mono">' + escapeHtml(hop.from || "—") + '</td>';
      routingSection += '<td class="mono">' + escapeHtml(hop.by || "—") + '</td>';
      routingSection += '<td>' + escapeHtml(hop.protocol || "—") + '</td>';
      routingSection += '<td>' + tlsCell + '</td>';
      routingSection += '<td style="font-size:10px;color:#666">' + escapeHtml(hop.timestamp || "—") + '</td>';
      routingSection += '</tr>';
    }
    routingSection += '</table>';
  }

  var html = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Email Inspector Report</title>';
  html += '<style>';
  html += 'body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:12px;color:#1a1d23;max-width:780px;margin:0 auto;padding:32px 24px}';
  html += 'h1{font-size:18px;margin:0 0 4px}';
  html += 'h2{font-size:13px;color:#4b5563;border-bottom:2px solid #e5e7eb;padding-bottom:6px;margin:24px 0 10px;text-transform:uppercase;letter-spacing:0.03em}';
  html += '.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;padding-bottom:16px;border-bottom:2px solid #1a1d23}';
  html += '.score{font-size:42px;font-weight:800;line-height:1}.verdict{font-size:14px;font-weight:700}';
  html += '.meta{color:#6b7280;font-size:10px;margin-top:4px}';
  html += '.summary-box{background:#f8f9fb;border:1px solid #e5e7eb;border-radius:6px;padding:10px 14px;margin:10px 0;font-size:12px;line-height:1.6}';
  html += '.summary-box strong{display:inline-block;width:80px;color:#4b5563}';
  html += '.origin-tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px;margin-left:6px}';
  html += '.origin-tag--int{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}';
  html += '.origin-tag--ext{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe}';
  html += '.guidance{background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;padding:10px 14px;margin:10px 0}';
  html += '.guidance li{margin:3px 0;font-size:11px}';
  html += '.check{border:1px solid #e5e7eb;border-radius:6px;padding:10px 12px;margin:6px 0}';
  html += '.check-header{font-size:12px;margin-bottom:4px}';
  html += '.check-badge{font-weight:700;margin-right:4px}';
  html += '.check-summary{font-size:11px;color:#374151;margin-bottom:4px}';
  html += '.check-detail{font-size:10.5px;color:#6b7280;line-height:1.5;border-top:1px solid #f0f2f5;padding-top:6px;margin-top:4px}';
  html += 'table{width:100%;border-collapse:collapse;margin:8px 0}';
  html += 'th{text-align:left;font-size:10px;color:#6b7280;padding:4px 6px;border-bottom:2px solid #e5e7eb;text-transform:uppercase}';
  html += 'td{padding:5px 6px;border-bottom:1px solid #f0f2f5;vertical-align:top;font-size:11px}';
  html += '.mono{font-family:"Cascadia Code","Consolas",monospace;font-size:10px;word-break:break-all}';
  html += '.raw-headers{background:#f8f9fb;border:1px solid #e5e7eb;border-radius:6px;padding:12px;font-family:"Cascadia Code","Consolas",monospace;font-size:9.5px;line-height:1.4;white-space:pre-wrap;word-break:break-all;max-height:none;color:#374151}';
  html += '.footer{margin-top:24px;padding-top:8px;border-top:1px solid #e5e7eb;font-size:9px;color:#9ca3af;text-align:center}';
  html += '@media print{body{padding:16px;font-size:11px}@page{margin:1.2cm}.raw-headers{font-size:8px}}';
  html += '</style></head><body>';

  // Header
  html += '<div class="header"><div>';
  html += '<h1>' + escapeHtml(orgName) + ' — Email Analysis Report</h1>';
  html += '<div class="meta">Generated: ' + r.timestamp + ' &middot; v' + r.version + '</div>';
  html += '</div>';
  html += '<div style="text-align:right"><div class="score" style="color:' + verdictColor + '">' + r.score + '</div>';
  html += '<div class="verdict" style="color:' + verdictColor + '">' + escapeHtml(r.verdict.label) + '</div></div></div>';

  // Email details + origin
  html += '<div class="summary-box">';
  html += '<strong>Origin:</strong> ' + (isInternal ? '<span class="origin-tag origin-tag--int">🏢 Internal</span>' : '<span class="origin-tag origin-tag--ext">🌐 External</span>') + '<br>';
  html += '<strong>From:</strong> ' + escapeHtml(decodeMimeHeader(r.envelope.from || "Unknown")) + '<br>';
  if (r.envelope.to) html += '<strong>To:</strong> ' + escapeHtml(r.envelope.to) + '<br>';
  if (r.envelope.subject) html += '<strong>Subject:</strong> ' + escapeHtml(decodeMimeHeader(r.envelope.subject)) + '<br>';
  if (r.envelope.date) html += '<strong>Date:</strong> ' + escapeHtml(r.envelope.date) + '<br>';
  if (r.envelope.returnPath) html += '<strong>Return-Path:</strong> ' + escapeHtml(r.envelope.returnPath) + '<br>';
  if (r.envelope.messageId) html += '<strong>Message-ID:</strong> ' + escapeHtml(r.envelope.messageId);
  html += '</div>';

  // Guidance
  if (r.guidance) {
    html += '<div class="guidance">';
    html += '<strong>' + escapeHtml(r.guidance.headline) + '</strong><br>';
    html += '<span style="font-size:11px">' + escapeHtml(r.guidance.body) + '</span>';
    if (r.guidance.actions && r.guidance.actions.length > 0) {
      html += '<ul>';
      for (var g = 0; g < r.guidance.actions.length; g++) {
        html += '<li>' + escapeHtml(r.guidance.actions[g]) + '</li>';
      }
      html += '</ul>';
    }
    html += '</div>';
  }

  // Auth checks with full details
  html += '<h2>Authentication Checks</h2>';
  html += checkSections;

  // Suspicious indicators with full details
  if (indicatorSections) {
    html += '<h2>Suspicious Indicators</h2>';
    html += indicatorSections;
  }

  // Full routing table
  if (routingSection) {
    html += '<h2>Mail Routing (' + r.receivedChain.length + ' hops)</h2>';
    html += routingSection;
  }

  // Raw headers
  html += '<h2>Raw Internet Headers</h2>';
  html += '<div class="raw-headers">' + escapeHtml(rawHeaderText) + '</div>';

  // Footer
  html += '<div class="footer">Email Inspector v' + r.version + ' &middot; All analysis performed locally — no email data was transmitted externally.</div>';
  html += '</body></html>';

  // Open in new window for printing
  var reportWindow = window.open("", "_blank", "width=780,height=900");
  if (reportWindow) {
    reportWindow.document.write(html);
    reportWindow.document.close();
    // Auto-trigger print dialog after a short delay
    setTimeout(function () {
      try { reportWindow.print(); } catch (e) {}
    }, 500);
  } else {
    // Fallback: create downloadable blob
    try {
      var blob = new Blob([html], { type: "text/html" });
      var url = URL.createObjectURL(blob);
      window.open(url, "_blank");
    } catch (e) {
      showCopyFeedback("Pop-up blocked");
    }
  }
}

/* ------------------------------------------------------------------ */
/*  First-Run Tooltip Tour                                             */
/* ------------------------------------------------------------------ */

/**
 * Check if tour has been completed using Office roaming settings
 * (persists across sessions in Outlook), with localStorage fallback.
 */
function isTourDone() {
  try {
    if (Office.context && Office.context.roamingSettings) {
      return !!Office.context.roamingSettings.get("emailInspector_tourDone");
    }
  } catch (e) {}
  try {
    return !!localStorage.getItem("emailInspector_tourDone");
  } catch (e) {}
  return false;
}

function setTourDone() {
  try {
    if (Office.context && Office.context.roamingSettings) {
      Office.context.roamingSettings.set("emailInspector_tourDone", true);
      Office.context.roamingSettings.saveAsync();
    }
  } catch (e) {}
  try {
    localStorage.setItem("emailInspector_tourDone", "1");
  } catch (e) {}
}

var _tourSteps = [
  { target: ".score-banner", text: "This score (0–100) summarizes the email's authentication health. Green = verified, red = suspicious." },
  { target: ".guidance-box", text: "Expand this for plain-language advice on what to do with this email." },
  { target: ".checks-grid", text: "Tap any check to see details and learn what it means. Two columns keep things compact." },
];
var _tourCurrent = 0;

function showTooltipTourIfFirstRun() {
  if (isTourDone()) return;
  _tourCurrent = 0;
  setTimeout(_tourShowStep, 800);
}

function _tourShowStep() {
  // Remove any existing tooltip
  var existing = document.getElementById("tourTooltip");
  if (existing) existing.remove();

  if (_tourCurrent >= _tourSteps.length) {
    setTourDone();
    return;
  }

  var step = _tourSteps[_tourCurrent];
  var targetEl = document.querySelector(step.target);
  if (!targetEl) { _tourCurrent++; _tourShowStep(); return; }

  // Get position of target element
  var rect = targetEl.getBoundingClientRect();
  var scrollTop = document.documentElement.scrollTop || document.body.scrollTop;

  var tooltip = document.createElement("div");
  tooltip.id = "tourTooltip";
  tooltip.className = "tour-tooltip";
  tooltip.style.top = (rect.bottom + scrollTop + 8) + "px";
  tooltip.style.left = rect.left + "px";
  tooltip.style.width = Math.min(rect.width, 340) + "px";

  var isLast = _tourCurrent >= _tourSteps.length - 1;
  tooltip.innerHTML =
    '<div class="tour-tooltip__text">' + step.text + '</div>' +
    '<div class="tour-tooltip__actions">' +
      '<span class="tour-tooltip__count">' + (_tourCurrent + 1) + '/' + _tourSteps.length + '</span>' +
      (isLast
        ? '<button class="tour-tooltip__btn" id="tourActionBtn">Got it</button>'
        : '<button class="tour-tooltip__btn" id="tourActionBtn">Next</button>') +
      '<button class="tour-tooltip__skip" id="tourSkipBtn">Skip</button>' +
    '</div>';

  document.body.appendChild(tooltip);

  // Highlight target
  targetEl.classList.add("tour-highlight");

  // Bind events with stopPropagation
  document.getElementById("tourActionBtn").addEventListener("click", function (e) {
    e.stopPropagation();
    e.preventDefault();
    targetEl.classList.remove("tour-highlight");
    if (isLast) {
      _tourDismiss();
    } else {
      _tourCurrent++;
      _tourShowStep();
    }
  });

  document.getElementById("tourSkipBtn").addEventListener("click", function (e) {
    e.stopPropagation();
    e.preventDefault();
    targetEl.classList.remove("tour-highlight");
    _tourDismiss();
  });

  // Scroll target into view
  targetEl.scrollIntoView({ behavior: "smooth", block: "center" });
}

function _tourDismiss() {
  var existing = document.getElementById("tourTooltip");
  if (existing) existing.remove();
  // Remove any lingering highlights
  var highlighted = document.querySelectorAll(".tour-highlight");
  for (var i = 0; i < highlighted.length; i++) highlighted[i].classList.remove("tour-highlight");
  setTourDone();
}

</script>
