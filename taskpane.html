<!DOCTYPE html>
<!--
  Email Inspector v1.5.0
  Taskpane entry point - loads Office.js, parser, analysis engine, and UI controller.
-->
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Email Inspector</title>

  <!-- Office.js CDN (required for all Outlook add-ins) -->
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="taskpane.css"/>
</head>
<body>

  <!-- Main application mount point -->
  <div id="app">
    <div class="state-container">
      <div class="spinner"></div>
      <div class="state-container__message">Initializing Email Inspector…</div>
    </div>
  </div>

  <!-- Application scripts (order matters: dependencies first) -->
  <script src="../helpers/taskpane-utils.js"></script>
  <script src="../helpers/header-parser.js"></script>
  <script src="../helpers/phishing-detector.js"></script>
  <script src="../helpers/url-scanner.js"></script>
  <script src="../helpers/attachment-scanner.js"></script>
  <script src="../helpers/analysis-engine.js"></script>
  <script src="taskpane.js"></script>

</body>
</html>
